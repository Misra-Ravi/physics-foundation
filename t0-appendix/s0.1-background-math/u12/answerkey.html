<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Propagating Uncertainty in Physics Problems — Answer Key</title>
  <style>

    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap');
    :root {
      --navy:#0f172a;--indigo:#1e3a5f;--blue:#1d4ed8;--lblue:#3b82f6;--vblue:#dbeafe;
      --green:#16a34a;--vgreen:#dcfce7;--purple:#7c3aed;--vpurple:#ede9fe;
      --amber:#d97706;--vamber:#fef3c7;--red:#dc2626;--muted:#94a3b8;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito','Segoe UI',sans-serif;background:#f0f4ff;color:var(--navy);font-size:17px;line-height:1.75;background-image:radial-gradient(circle,#c7d2fe 1px,transparent 1px);background-size:28px 28px;}

    header{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#1d4ed8 100%);color:white;padding:48px 60px 44px;position:relative;overflow:hidden;text-align:center;}
    header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(99,102,241,0.35) 0%,transparent 60%),radial-gradient(ellipse at 80% 30%,rgba(59,130,246,0.3) 0%,transparent 55%);pointer-events:none;}
    .star{position:absolute;border-radius:50%;background:white;animation:twinkle 3s infinite alternate;}
    @keyframes twinkle{from{opacity:0.2;transform:scale(1);}to{opacity:0.9;transform:scale(1.5);}}
    .chip{display:inline-block;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:20px;padding:4px 16px;font-size:0.78rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:18px;position:relative;}
    header h1{font-size:2.7rem;font-weight:900;letter-spacing:-1px;position:relative;margin-bottom:10px;background:linear-gradient(90deg,#bfdbfe,#c7d2fe,#e0e7ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    header .subtitle{font-size:1rem;color:rgba(255,255,255,0.8);position:relative;max-width:620px;margin:0 auto;}

    main{max-width:940px;margin:44px auto;padding:0 24px 80px;}

    /* SECTION HEADERS */
    .sec-head{display:flex;align-items:center;gap:14px;margin:40px 0 22px;}
    .sec-icon{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
    .sec-head h2{font-size:1.4rem;font-weight:900;color:var(--navy);}

    /* RULE REFERENCE STRIP */
    .ref-strip{background:linear-gradient(135deg,#0f172a,#1e3a5f);border-radius:16px;padding:20px 28px;margin-bottom:40px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
    @media(max-width:660px){.ref-strip{grid-template-columns:1fr;}}
    .ref-tile .rt-num{font-size:0.7rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:6px;}
    .ref-tile .rt-formula{font-family:'Space Mono',monospace;font-size:0.82rem;color:#bfdbfe;background:rgba(255,255,255,0.08);border-radius:8px;padding:7px 10px;line-height:1.65;}

    /* TRUE/FALSE */
    .tf-grid{display:grid;grid-template-columns:1fr;gap:14px;margin-bottom:40px;}
    .tf-card{background:white;border-radius:14px;padding:18px 22px;box-shadow:0 3px 14px rgba(0,0,0,0.07);border:1px solid #e0e7ff;display:flex;gap:16px;align-items:flex-start;}
    .tf-num{background:linear-gradient(135deg,#1e3a5f,#1d4ed8);color:white;font-size:0.8rem;font-weight:800;min-width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
    .tf-body{flex:1;}
    .tf-stmt{font-size:0.95rem;color:#1e293b;margin-bottom:10px;line-height:1.65;}
    .tf-btn-row{display:flex;gap:10px;margin-bottom:8px;}
    .tf-btn{background:rgba(0,0,0,0.04);border:2px solid #e2e8f0;color:#475569;font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:800;padding:7px 22px;border-radius:30px;cursor:pointer;transition:all 0.18s;}
    .tf-btn:hover{background:#dbeafe;border-color:#93c5fd;color:#1e3a5f;}
    .tf-btn.correct{background:#22c55e;border-color:#22c55e;color:white;}
    .tf-btn.wrong{background:#ef4444;border-color:#ef4444;color:white;}
    .tf-fb{font-size:0.84rem;display:none;padding:7px 12px;border-radius:8px;margin-top:4px;}
    .tf-fb.show{display:block;}
    .tf-fb.ok{background:#dcfce7;color:#14532d;}
    .tf-fb.bad{background:#fee2e2;color:#7f1d1d;}

    /* MULTI-STEP PROBLEMS */
    .problem-card{background:white;border-radius:20px;margin-bottom:32px;box-shadow:0 4px 22px rgba(0,0,0,0.08);overflow:hidden;border:1px solid #e0e7ff;}
    .pc-header{padding:16px 26px;display:flex;align-items:center;gap:14px;border-bottom:2px solid #e0e7ff;}
    .pc-num{font-size:1.5rem;font-weight:900;color:white;background:linear-gradient(135deg,#1e3a5f,#1d4ed8);width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .pc-num.hard{background:linear-gradient(135deg,#5b21b6,#7c3aed);}
    .pc-title{font-size:1.1rem;font-weight:900;color:var(--navy);}
    .pc-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
    .pc-tag{background:#dbeafe;color:#1e3a5f;font-size:0.7rem;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;padding:2px 10px;border-radius:10px;}
    .pc-tag.hard{background:#ede9fe;color:#5b21b6;}
    .pc-tag.r3{background:#cffafe;color:#0e7490;}
    .pc-tag.r2{background:#fef9c3;color:#713f12;}
    .pc-body{padding:22px 26px;}
    .prob-stmt{background:linear-gradient(135deg,#f0f9ff,#eff6ff);border:1.5px solid #bae6fd;border-radius:12px;padding:14px 18px;margin-bottom:18px;font-size:0.95rem;color:#1e3a5f;line-height:1.75;}
    .prob-stmt strong{color:#1d4ed8;}
    .given-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
    .given-chip{background:#dbeafe;border:1px solid #93c5fd;border-radius:8px;padding:6px 14px;font-family:'Space Mono',monospace;font-size:0.9rem;font-weight:700;color:#1e3a5f;}
    .workspace{background:#f8fafc;border:1.5px dashed #94a3b8;border-radius:12px;padding:18px 20px;margin-bottom:18px;}
    .workspace-label{font-size:0.72rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:#94a3b8;margin-bottom:12px;}
    .ws-lines{display:flex;flex-direction:column;gap:16px;}
    .ws-line{display:flex;align-items:center;gap:12px;}
    .ws-label{font-size:0.82rem;font-weight:700;color:#64748b;min-width:160px;flex-shrink:0;}
    .ws-box{flex:1;height:38px;background:white;border:1.5px solid #e2e8f0;border-radius:8px;}
    .answer-key{margin-top:8px;}
    .ak-toggle{background:none;border:2px solid #1d4ed8;color:#1d4ed8;font-family:'Nunito',sans-serif;font-size:0.88rem;font-weight:800;padding:8px 20px;border-radius:30px;cursor:pointer;transition:all 0.2s;}
    .ak-toggle:hover{background:#1d4ed8;color:white;}
    .ak-panel{display:none;margin-top:14px;background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:2px solid #86efac;border-radius:14px;padding:18px 22px;}
    .ak-panel.open{display:block;}
    .ak-panel h4{font-size:0.88rem;font-weight:900;color:#14532d;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
    .ak-step{display:flex;gap:10px;align-items:flex-start;font-size:0.88rem;color:#374151;margin-bottom:9px;}
    .ak-dot{width:22px;height:22px;border-radius:50%;background:#16a34a;color:white;font-weight:800;font-size:0.72rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
    .ak-step code{font-family:'Space Mono',monospace;font-size:0.85rem;font-weight:700;background:white;border-radius:4px;padding:1px 6px;color:#166534;}
    .ak-final{background:#16a34a;color:white;border-radius:10px;padding:10px 16px;margin-top:10px;font-family:'Space Mono',monospace;font-size:1rem;font-weight:700;}

    /* EXTENDED PROBLEM */
    .ext-card{background:linear-gradient(135deg,#1e1b4b,#312e81);border-radius:20px;padding:30px 32px;color:white;margin-bottom:24px;}
    .ext-card h3{font-size:1.15rem;font-weight:900;margin-bottom:14px;color:#e0e7ff;}
    .ext-card p{font-size:0.92rem;color:rgba(255,255,255,0.85);margin-bottom:12px;line-height:1.7;}
    .ext-card .ext-parts{display:flex;flex-direction:column;gap:10px;margin:16px 0;}
    .ext-part{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:11px 16px;font-size:0.9rem;color:rgba(255,255,255,0.9);}
    .ext-given{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0;}
    .ext-chip{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:5px 13px;font-family:'Space Mono',monospace;font-size:0.85rem;color:#bfdbfe;}
    .ext-ak-toggle{background:none;border:2px solid rgba(255,255,255,0.4);color:white;font-family:'Nunito',sans-serif;font-size:0.88rem;font-weight:800;padding:8px 20px;border-radius:30px;cursor:pointer;transition:all 0.2s;}
    .ext-ak-toggle:hover{background:rgba(255,255,255,0.15);}
    .ext-ak-panel{display:none;margin-top:14px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.2);border-radius:14px;padding:18px 22px;}
    .ext-ak-panel.open{display:block;}
    .ext-ak-panel h4{font-size:0.88rem;font-weight:900;color:#a5f3fc;margin-bottom:12px;}
    .ext-ak-step{font-size:0.86rem;color:rgba(255,255,255,0.85);margin-bottom:8px;padding-left:12px;border-left:3px solid #38bdf8;}
    .ext-ak-step code{font-family:'Space Mono',monospace;font-size:0.84rem;background:rgba(255,255,255,0.1);border-radius:4px;padding:1px 6px;color:#bae6fd;}
    .ext-ak-final{background:rgba(34,197,94,0.3);border:1px solid rgba(34,197,94,0.5);border-radius:10px;padding:10px 16px;margin-top:10px;font-family:'Space Mono',monospace;font-size:0.95rem;color:#bbf7d0;}

    footer{text-align:center;padding:32px 20px;font-size:0.85rem;color:var(--muted);}

    @keyframes popIn{0%{transform:scale(0.9);}60%{transform:scale(1.1);}100%{transform:scale(1);}}
  
  .ak-header{background:linear-gradient(135deg,#1e40af,#1d4ed8);color:white;border-radius:12px;padding:22px 28px;margin-bottom:28px;}
  .ak-header h1{font-size:1.3rem;margin:0;font-weight:800;}
  .ak-header p{margin:6px 0 0;opacity:.75;font-size:.88rem;}
  #answer-key{display:block!important;}
  </style>
</head>
<body>
  <div class="ak-header">
    <h1>🔑 Answer Key</h1>
    <p>Propagating Uncertainty in Physics Problems — Homework</p>
  </div>
  <p>Answer key content not found.</p>
</body>
</html>
