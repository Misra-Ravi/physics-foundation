<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Line of Best Fit — Answer Key</title>
  <style>

    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito',sans-serif;background:#f0f4f8;background-image:radial-gradient(circle,#c7d2fe 1px,transparent 1px);background-size:28px 28px;color:#1a1a2e;font-size:16px;line-height:1.7;}
    header{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#1e40af 100%);color:white;padding:32px 60px 28px;position:relative;overflow:hidden;}
    header .star{position:absolute;border-radius:50%;background:white;animation:twinkle 3s infinite alternate;}
    @keyframes twinkle{from{opacity:0.2;transform:scale(1);}to{opacity:0.9;transform:scale(1.4);}}
    header .label{font-size:12px;text-transform:uppercase;letter-spacing:2px;opacity:0.85;margin-bottom:6px;position:relative;}
    header h1{font-size:2rem;font-weight:800;margin-bottom:4px;position:relative;}
    header .meta{opacity:0.85;font-size:0.9rem;position:relative;}
    main{max-width:820px;margin:36px auto;padding:0 24px 60px;}

    /* reference */
    .ref-box{background:white;border:2px solid #bfdbfe;border-radius:10px;padding:18px 22px;margin-bottom:28px;}
    .ref-box h3{color:#1e40af;font-size:1rem;font-weight:800;margin-bottom:8px;}
    .ref-eq{font-family:'Space Mono',monospace;font-size:0.82rem;background:#eff6ff;color:#1d4ed8;padding:10px 16px;border-radius:8px;line-height:1.9;margin-bottom:8px;}
    .ref-box .tip{font-size:0.87rem;color:#374151;padding:8px 14px;background:#f0f4ff;border-left:4px solid #3b82f6;border-radius:4px;margin-top:8px;}

    /* layout */
    section{margin-bottom:40px;}
    h2{font-size:1.2rem;font-weight:700;color:#1e40af;border-left:5px solid #2563eb;padding-left:12px;margin-bottom:16px;}
    .instructions{color:#4b5563;font-size:0.9rem;margin-bottom:16px;font-style:italic;}
    .problem-card{background:white;border-radius:10px;padding:18px 22px;box-shadow:0 1px 5px rgba(0,0,0,0.07);margin-bottom:14px;}
    .problem-num{font-size:0.72rem;font-weight:700;text-transform:uppercase;color:#6b7280;margin-bottom:8px;}
    .field-set{display:flex;flex-direction:column;gap:8px;}
    .field-row{display:flex;align-items:center;gap:8px;font-size:0.85rem;flex-wrap:wrap;}
    .fill-line{border-bottom:2px solid #d1d5db;min-height:24px;flex:1;min-width:80px;}
    .short-line{border-bottom:2px solid #d1d5db;min-height:24px;width:150px;display:inline-block;}
    .short-answer{background:white;border-radius:8px;padding:18px 22px;box-shadow:0 1px 5px rgba(0,0,0,0.07);margin-bottom:14px;}
    .short-answer .q{font-weight:600;margin-bottom:10px;font-size:0.95rem;}
    .write-lines{display:flex;flex-direction:column;gap:14px;}
    .write-line{border-bottom:2px solid #d1d5db;min-height:28px;width:100%;}

    /* lp mock */
    .lp-mock{background:#1e293b;border-radius:10px;padding:14px 18px;font-family:'Space Mono',monospace;font-size:0.82rem;color:#94a3b8;margin-bottom:14px;}
    .lp-mock .lp-lbl{color:#34d399;font-weight:700;}
    .lp-mock .lp-v{color:#fbbf24;}
    .lp-mock .lp-row{margin-bottom:5px;}

    /* equation fill */
    .eq-fill{background:#f8fafc;border-radius:10px;padding:14px 18px;font-family:'Space Mono',monospace;font-size:0.88rem;color:#374151;margin-top:10px;line-height:2.4;border:1px dashed #cbd5e1;}
    .eq-blank{display:inline-block;border-bottom:2px solid #2563eb;min-width:80px;vertical-align:bottom;margin:0 3px;}

    /* true/false */
    .tf-card{background:white;border-radius:8px;padding:14px 20px;box-shadow:0 1px 5px rgba(0,0,0,0.07);margin-bottom:10px;display:flex;align-items:flex-start;gap:16px;}
    .tf-num{font-size:0.72rem;font-weight:700;text-transform:uppercase;color:#6b7280;min-width:30px;margin-top:3px;}
    .tf-body{flex:1;}
    .tf-stmt{font-size:0.93rem;margin-bottom:6px;}
    .tf-correct{font-size:0.82rem;color:#6b7280;}
    .tf-correct span{border-bottom:2px solid #d1d5db;display:inline-block;width:260px;}
    .tf-circles{display:flex;gap:10px;flex-shrink:0;}
    .tf-circle{width:28px;height:28px;border-radius:50%;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:#9ca3af;}

    /* answer key */
    .key-btn-wrap{text-align:center;margin:40px 0 20px;}
    #toggle-key-btn{background:#1e40af;color:white;border:none;padding:12px 32px;font-size:1rem;font-weight:700;border-radius:8px;cursor:pointer;font-family:inherit;}
    #answer-key{display:none;background:#eff6ff;border:2px solid #93c5fd;border-radius:12px;padding:28px 32px;}
    #answer-key h2{color:#1e40af;border-left-color:#2563eb;margin-bottom:22px;}
    .key-section{margin-bottom:24px;}
    .key-section h3{font-size:1rem;font-weight:700;color:#1e40af;margin-bottom:12px;}
    .key-item{background:white;border-radius:6px;padding:10px 14px;font-size:0.92rem;margin-bottom:8px;}
    .key-item .kq{font-size:0.8rem;color:#6b7280;margin-bottom:2px;}
    .key-item .kans{color:#1d4ed8;font-weight:700;}
    .key-item .kexpl{color:#4b5563;font-size:0.82rem;margin-top:4px;}
    .short-ans-key{background:white;border-radius:6px;padding:12px 16px;font-size:0.92rem;margin-bottom:10px;line-height:1.8;}
    .short-ans-key strong{color:#1d4ed8;}
    .short-ans-key .kfml{font-family:'Space Mono',monospace;font-size:0.85rem;color:#1d4ed8;background:#eff6ff;padding:4px 10px;border-radius:6px;display:inline-block;margin:3px 0;}
  
  .ak-header{background:linear-gradient(135deg,#1e40af,#1d4ed8);color:white;border-radius:12px;padding:22px 28px;margin-bottom:28px;}
  .ak-header h1{font-size:1.3rem;margin:0;font-weight:800;}
  .ak-header p{margin:6px 0 0;opacity:.75;font-size:.88rem;}
  #answer-key{display:block!important;}
  </style>
</head>
<body>
  <div class="ak-header">
    <h1>🔑 Answer Key</h1>
    <p>Line of Best Fit — Homework</p>
  </div>
  <p>Answer key content not found.</p>
</body>
</html>
