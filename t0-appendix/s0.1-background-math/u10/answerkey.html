<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Propagating Uncertainty: Multiplying &amp; Dividing — Answer Key</title>
  <style>

    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito',sans-serif;background:#f5f3ff;background-image:radial-gradient(circle,#ddd6fe 1px,transparent 1px);background-size:28px 28px;color:#1a1a2e;font-size:16px;line-height:1.7;}
    header{background:linear-gradient(135deg,#4c1d95 0%,#6d28d9 60%,#7c3aed 100%);color:white;padding:32px 60px 28px;position:relative;overflow:hidden;}
    header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 30%,rgba(167,139,250,0.30) 0%,transparent 60%);pointer-events:none;}
    .star{position:absolute;border-radius:50%;background:white;animation:twinkle 3s infinite alternate;}
    @keyframes twinkle{from{opacity:0.2;transform:scale(1);}to{opacity:0.9;transform:scale(1.4);}}
    header .label{font-size:12px;text-transform:uppercase;letter-spacing:2px;opacity:0.85;margin-bottom:6px;position:relative;}
    header h1{font-size:2rem;font-weight:800;margin-bottom:4px;position:relative;}
    header .meta{opacity:0.85;font-size:0.9rem;position:relative;}
    main{max-width:920px;margin:36px auto;padding:0 24px 60px;}
    /* reference box */
    .rules-box{background:white;border:2px solid #ddd6fe;border-radius:10px;padding:18px 22px;margin-bottom:36px;}
    .rules-box h3{color:#4c1d95;font-size:1rem;margin-bottom:10px;font-weight:800;}
    .rules-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    @media(max-width:600px){.rules-grid{grid-template-columns:1fr;}}
    .rule-item{background:#f5f3ff;border-radius:8px;padding:10px 14px;font-size:0.88rem;color:#374151;}
    .rule-item strong{color:#4c1d95;}
    .rule-item code{font-family:'Space Mono',monospace;background:#ede9fe;padding:1px 5px;border-radius:3px;font-size:0.83rem;color:#4c1d95;}
    .tip-row{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;}
    .tip-pill{background:#ede9fe;border:1px solid #a78bfa;border-radius:20px;padding:4px 12px;font-size:0.82rem;font-weight:700;color:#4c1d95;}
    .warn-pill{background:#fee2e2;border:1px solid #fca5a5;border-radius:20px;padding:4px 12px;font-size:0.82rem;font-weight:700;color:#991b1b;}
    .contrast-strip{background:linear-gradient(90deg,#fef3c7,#ede9fe);border-radius:8px;padding:10px 16px;margin-top:10px;font-size:0.85rem;font-weight:700;color:#374151;border:1px solid #c4b5fd;}
    /* sections */
    section{margin-bottom:44px;}
    h2{font-size:1.25rem;font-weight:700;color:#4c1d95;border-left:5px solid #7c3aed;padding-left:12px;margin-bottom:18px;}
    .instructions{color:#4b5563;font-size:0.92rem;margin-bottom:18px;font-style:italic;}
    /* problem cards */
    .problem-card{background:white;border-radius:8px;padding:18px 22px;box-shadow:0 1px 5px rgba(0,0,0,0.07);margin-bottom:16px;}
    .problem-num{font-size:0.75rem;font-weight:700;text-transform:uppercase;color:#6b7280;margin-bottom:6px;}
    .problem-display{font-family:'Space Mono',monospace;font-size:1.35rem;font-weight:700;color:#1a1a2e;margin-bottom:14px;}
    .work-space{margin-bottom:10px;}
    .work-label{font-size:0.8rem;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
    .work-lines{display:flex;flex-direction:column;gap:12px;}
    .work-line{border-bottom:2px solid #e5e7eb;min-height:26px;width:100%;}
    .answer-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:10px;}
    .answer-label{font-size:0.88rem;font-weight:700;color:#4c1d95;}
    .answer-line{border-bottom:2px solid #6d28d9;min-height:28px;width:200px;display:inline-block;}
    /* challenge cards */
    .challenge-card{background:white;border-radius:8px;padding:18px 22px;box-shadow:0 1px 5px rgba(0,0,0,0.07);margin-bottom:16px;border-left:4px solid #7c3aed;}
    .challenge-badge{display:inline-block;background:linear-gradient(135deg,#4c1d95,#7c3aed);color:white;font-size:0.75rem;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;padding:2px 10px;border-radius:4px;margin-bottom:8px;}
    /* context cards (real-world scenarios) */
    .context-card{background:white;border-radius:8px;padding:20px 22px;box-shadow:0 2px 8px rgba(109,40,217,0.1);margin-bottom:16px;border:2px solid #ede9fe;}
    .context-badge{display:inline-block;background:#f5f3ff;color:#4c1d95;border:1px solid #a78bfa;font-size:0.75rem;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;padding:3px 10px;border-radius:20px;margin-bottom:10px;}
    .context-text{font-size:0.92rem;color:#374151;margin-bottom:14px;line-height:1.65;}
    .context-text strong{color:#4c1d95;}
    .sub-question{margin-bottom:12px;}
    .sub-question .sq-label{font-size:0.82rem;font-weight:700;color:#6d28d9;margin-bottom:4px;}
    .step-blank{border-bottom:1px solid #9ca3af;display:inline-block;min-width:80px;min-height:18px;vertical-align:bottom;}
    /* mixed grid */
    .mixed-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    @media(max-width:600px){.mixed-grid{grid-template-columns:1fr;}}
    .mixed-card{background:white;border-radius:8px;padding:16px 18px;box-shadow:0 1px 5px rgba(0,0,0,0.07);}
    .op-badge{display:inline-block;font-size:0.75rem;font-weight:800;padding:2px 8px;border-radius:4px;margin-bottom:6px;}
    .op-mul{background:#ede9fe;color:#4c1d95;}
    .op-div{background:#f3e8ff;color:#6b21a8;}
    /* short answer */
    .short-answer{background:white;border-radius:8px;padding:18px 22px;box-shadow:0 1px 5px rgba(0,0,0,0.07);margin-bottom:14px;}
    .short-answer .q{font-weight:600;margin-bottom:10px;font-size:0.95rem;color:#1a1a2e;}
    .write-lines{display:flex;flex-direction:column;gap:14px;}
    .write-line{border-bottom:2px solid #d1d5db;min-height:28px;width:100%;}
    /* error analysis */
    .error-card{background:linear-gradient(135deg,#fff1f2,#fef2ff);border:2px solid #f9a8d4;border-radius:8px;padding:18px 22px;margin-bottom:14px;}
    .error-badge{display:inline-block;background:#fce7f3;color:#9d174d;font-size:0.75rem;font-weight:800;text-transform:uppercase;padding:2px 8px;border-radius:4px;margin-bottom:8px;}
    .student-work{font-family:'Space Mono',monospace;background:#fff;border:1px solid #fda4af;border-radius:6px;padding:12px 16px;font-size:0.88rem;color:#374151;margin:10px 0;}
    /* answer key */
    .key-btn-wrap{text-align:center;margin:40px 0 20px;}
    #toggle-key-btn{background:#4c1d95;color:white;border:none;padding:12px 32px;font-size:1rem;font-weight:700;border-radius:8px;cursor:pointer;font-family:inherit;}
    #toggle-key-btn:hover{background:#3b0764;}
    #answer-key{display:none;background:#f5f3ff;border:2px solid #a78bfa;border-radius:12px;padding:28px 32px;}
    #answer-key h2{color:#4c1d95;border-left-color:#7c3aed;margin-bottom:22px;}
    .key-section{margin-bottom:28px;}
    .key-section h3{font-size:1rem;font-weight:700;color:#4c1d95;margin-bottom:12px;}
    .key-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
    @media(max-width:500px){.key-grid{grid-template-columns:1fr;}}
    .key-item{background:white;border-radius:6px;padding:12px 16px;font-size:0.9rem;border-left:3px solid #a78bfa;}
    .key-item .knum{font-size:0.75rem;font-weight:700;text-transform:uppercase;color:#6b7280;margin-bottom:4px;}
    .key-item .kproblem{font-family:'Space Mono',monospace;font-size:0.88rem;color:#374151;margin-bottom:6px;}
    .key-item .kans{font-family:'Space Mono',monospace;font-weight:700;color:#4c1d95;font-size:1rem;}
    .key-item .kexpl{color:#4b5563;font-size:0.8rem;margin-top:4px;}
    .short-ans-key{background:white;border-radius:6px;padding:12px 16px;margin-bottom:10px;font-size:0.92rem;border-left:3px solid #7c3aed;}
    .short-ans-key strong{color:#4c1d95;}
  
  .ak-header{background:linear-gradient(135deg,#1e40af,#1d4ed8);color:white;border-radius:12px;padding:22px 28px;margin-bottom:28px;}
  .ak-header h1{font-size:1.3rem;margin:0;font-weight:800;}
  .ak-header p{margin:6px 0 0;opacity:.75;font-size:.88rem;}
  #answer-key{display:block!important;}
  </style>
</head>
<body>
  <div class="ak-header">
    <h1>🔑 Answer Key</h1>
    <p>Propagating Uncertainty: Multiplying &amp; Dividing — Homework</p>
  </div>
  <p>Answer key content not found.</p>
</body>
</html>
