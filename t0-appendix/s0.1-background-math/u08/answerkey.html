<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Absolute, Fractional &amp; Percent Uncertainty — Answer Key</title>
  <style>

    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito',sans-serif;background:#f0f4f8;background-image:radial-gradient(circle,#99f6e4 1px,transparent 1px);background-size:28px 28px;color:#1a1a2e;font-size:16px;line-height:1.7;}
    header{background:linear-gradient(135deg,#065f46 0%,#0d9488 60%,#0f766e 100%);color:white;padding:32px 60px 28px;}
    header .label{font-size:12px;text-transform:uppercase;letter-spacing:2px;opacity:0.85;margin-bottom:6px;}
    header h1{font-size:2rem;font-weight:800;margin-bottom:4px;}
    header .meta{opacity:0.85;font-size:0.9rem;}
    main{max-width:920px;margin:36px auto;padding:0 24px 60px;}
    .rules-box{background:white;border:2px solid #ccfbf1;border-radius:10px;padding:18px 22px;margin-bottom:36px;}
    .rules-box h3{color:#0f766e;font-size:1rem;margin-bottom:10px;}
    .rules-box .rules-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    @media(max-width:600px){.rules-box .rules-grid{grid-template-columns:1fr;}}
    .rules-box .rule-item{background:#f0fdfa;border-radius:8px;padding:10px 14px;font-size:0.88rem;color:#374151;}
    .rules-box .rule-item strong{color:#0f766e;}
    .rules-box .rule-item code{font-family:'Space Mono',monospace;background:#ccfbf1;padding:1px 5px;border-radius:3px;font-size:0.83rem;}
    .tip{margin-top:10px;padding:10px 14px;background:#f0fdfa;border-left:4px solid #0d9488;border-radius:4px;font-size:0.88rem;color:#134e4a;}
    section{margin-bottom:44px;}
    h2{font-size:1.25rem;font-weight:700;color:#0f766e;border-left:5px solid #0d9488;padding-left:12px;margin-bottom:18px;}
    .instructions{color:#4b5563;font-size:0.92rem;margin-bottom:18px;font-style:italic;}
    /* Part A — multi-step table */
    .conv-table{width:100%;border-collapse:collapse;background:white;border-radius:10px;overflow:hidden;box-shadow:0 1px 5px rgba(0,0,0,0.07);}
    .conv-table th{background:#0f766e;color:white;font-size:0.82rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;padding:12px 16px;text-align:center;}
    .conv-table td{padding:12px 16px;border-bottom:1px solid #e5e7eb;text-align:center;vertical-align:middle;}
    .conv-table tr:last-child td{border-bottom:none;}
    .conv-table tr:nth-child(even) td{background:#f9fafb;}
    .val{font-family:'Space Mono',monospace;font-size:1.05rem;font-weight:700;color:#0f766e;}
    .blank-cell{display:inline-block;border-bottom:2px solid #9ca3af;min-width:120px;min-height:24px;}
    /* Part B — rounding */
    .problem-card-wide{background:white;border-radius:8px;padding:16px 20px;box-shadow:0 1px 5px rgba(0,0,0,0.07);margin-bottom:14px;}
    .problem-num{font-size:0.75rem;font-weight:700;text-transform:uppercase;color:#6b7280;margin-bottom:6px;}
    .number-display{font-family:'Space Mono',monospace;font-size:1.5rem;font-weight:700;color:#1a1a2e;margin-bottom:10px;}
    .answer-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .answer-label{font-size:0.85rem;color:#6b7280;}
    .answer-line{border-bottom:2px solid #d1d5db;min-height:28px;width:180px;display:inline-block;}
    /* Part C — T/F */
    .tf-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    @media(max-width:600px){.tf-grid{grid-template-columns:1fr;}}
    .tf-card{background:white;border-radius:8px;padding:16px 18px;box-shadow:0 1px 5px rgba(0,0,0,0.07);}
    .tf-card .tf-q{font-size:0.92rem;color:#1a1a2e;margin-bottom:10px;font-weight:600;}
    .tf-options{display:flex;gap:12px;}
    .tf-lbl{display:flex;align-items:center;gap:6px;font-size:0.92rem;font-weight:700;cursor:pointer;}
    .tf-lbl input{width:16px;height:16px;accent-color:#0d9488;}
    .tf-T{color:#065f46;}.tf-F{color:#dc2626;}
    /* Part D — short answer */
    .short-answer{background:white;border-radius:8px;padding:18px 22px;box-shadow:0 1px 5px rgba(0,0,0,0.07);margin-bottom:14px;}
    .short-answer .q{font-weight:600;margin-bottom:10px;font-size:0.95rem;}
    .write-lines{display:flex;flex-direction:column;gap:14px;}
    .write-line{border-bottom:2px solid #d1d5db;min-height:28px;width:100%;}
    /* bonus */
    .bonus-card{background:linear-gradient(135deg,#ecfdf5,#d1fae5);border:2px solid #6ee7b7;border-radius:10px;padding:18px 22px;box-shadow:0 1px 5px rgba(0,0,0,0.07);margin-bottom:14px;}
    .bonus-card .q{font-weight:600;margin-bottom:10px;}
    /* key */
    .key-btn-wrap{text-align:center;margin:40px 0 20px;}
    #toggle-key-btn{background:#0f766e;color:white;border:none;padding:12px 32px;font-size:1rem;font-weight:700;border-radius:8px;cursor:pointer;font-family:inherit;}
    #toggle-key-btn:hover{background:#0d6f67;}
    #answer-key{display:none;background:#f0fdfa;border:2px solid #99f6e4;border-radius:12px;padding:28px 32px;}
    #answer-key h2{color:#0f766e;border-left-color:#0d9488;margin-bottom:22px;}
    .key-section{margin-bottom:28px;}
    .key-section h3{font-size:1rem;font-weight:700;color:#0f766e;margin-bottom:12px;}
    .key-table{width:100%;border-collapse:collapse;background:white;border-radius:8px;overflow:hidden;}
    .key-table th{background:#0d9488;color:white;font-size:0.8rem;padding:10px 14px;text-align:center;}
    .key-table td{padding:10px 14px;border-bottom:1px solid #e5e7eb;text-align:center;font-size:0.9rem;}
    .key-table tr:last-child td{border-bottom:none;}
    .key-table tr:nth-child(even) td{background:#f9fafb;}
    .key-table .kans{font-family:'Space Mono',monospace;font-weight:700;color:#0f766e;}
    .key-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
    .key-item{background:white;border-radius:6px;padding:10px 14px;font-size:0.9rem;}
    .key-item .knum{font-family:'Space Mono',monospace;font-weight:700;font-size:0.95rem;}
    .key-item .kans{color:#0f766e;font-weight:700;}
    .key-item .kexpl{color:#4b5563;font-size:0.82rem;margin-top:2px;}
    .tf-key-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
    .tf-key-item{background:white;border-radius:6px;padding:8px 12px;font-size:0.88rem;}
    .tf-key-item .kans{font-weight:700;}
    .tf-T-ans{color:#065f46;}.tf-F-ans{color:#dc2626;}
    .short-ans-key{background:white;border-radius:6px;padding:12px 16px;margin-bottom:10px;font-size:0.92rem;}
    .short-ans-key strong{color:#0f766e;}
  
  .ak-header{background:linear-gradient(135deg,#1e40af,#1d4ed8);color:white;border-radius:12px;padding:22px 28px;margin-bottom:28px;}
  .ak-header h1{font-size:1.3rem;margin:0;font-weight:800;}
  .ak-header p{margin:6px 0 0;opacity:.75;font-size:.88rem;}
  #answer-key{display:block!important;}
  </style>
</head>
<body>
  <div class="ak-header">
    <h1>🔑 Answer Key</h1>
    <p>Absolute, Fractional &amp; Percent Uncertainty — Homework</p>
  </div>
  <p>Answer key content not found.</p>
</body>
</html>
