<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Table — Answer Key</title>
  <style>

    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito',sans-serif;background:#f0f4f8;background-image:radial-gradient(circle,#c7d2fe 1px,transparent 1px);background-size:28px 28px;color:#1a1a2e;font-size:16px;line-height:1.7;}
    header{background:linear-gradient(135deg,#0f766e 0%,#0d9488 100%);color:white;padding:32px 60px 28px;}
    header .label{font-size:12px;text-transform:uppercase;letter-spacing:2px;opacity:0.85;margin-bottom:6px;}
    header h1{font-size:2rem;font-weight:800;margin-bottom:4px;}
    header .meta{opacity:0.85;font-size:0.9rem;}
    main{max-width:860px;margin:36px auto;padding:0 24px 60px;}
    .ref-box{background:white;border:2px solid #99f6e4;border-radius:10px;padding:18px 22px;margin-bottom:28px;}
    .ref-box h3{color:#0f766e;font-size:1rem;margin-bottom:8px;}
    .ref-box .tip{font-size:0.87rem;color:#374151;padding:8px 14px;background:#f0fdfa;border-left:4px solid #0d9488;border-radius:4px;margin-top:8px;}
    section{margin-bottom:40px;}
    h2{font-size:1.2rem;font-weight:700;color:#0f766e;border-left:5px solid #0d9488;padding-left:12px;margin-bottom:16px;}
    .instructions{color:#4b5563;font-size:0.9rem;margin-bottom:16px;font-style:italic;}
    .dt-scaffold{width:100%;border-collapse:collapse;font-size:0.85rem;margin-bottom:14px;}
    .dt-scaffold th,.dt-scaffold td{border:2px solid #d1d5db;padding:8px 10px;text-align:center;}
    .dt-scaffold thead th{background:#0f766e;color:white;font-size:0.8rem;}
    .dt-scaffold thead tr:last-child th{background:#0d9488;color:white;font-size:0.78rem;}
    .dt-scaffold .iv-col{background:#eff6ff;font-weight:700;font-family:'Space Mono',monospace;}
    .dt-scaffold .given{background:#f8fafc;font-family:'Space Mono',monospace;}
    .dt-scaffold .blank{background:white;min-width:60px;}
    .err-student{background:#fef2f2;color:#991b1b;font-family:'Space Mono',monospace;}
    .short-answer{background:white;border-radius:8px;padding:18px 22px;box-shadow:0 1px 5px rgba(0,0,0,0.07);margin-bottom:14px;}
    .short-answer .q{font-weight:600;margin-bottom:10px;font-size:0.95rem;}
    .write-lines{display:flex;flex-direction:column;gap:14px;}
    .write-line{border-bottom:2px solid #d1d5db;min-height:28px;width:100%;}
    .tf-card{background:white;border-radius:8px;padding:14px 20px;box-shadow:0 1px 5px rgba(0,0,0,0.07);margin-bottom:10px;display:flex;align-items:flex-start;gap:16px;}
    .tf-num{font-size:0.72rem;font-weight:700;text-transform:uppercase;color:#6b7280;min-width:30px;}
    .tf-stmt{flex:1;font-size:0.93rem;}
    .tf-circles{display:flex;gap:10px;flex-shrink:0;}
    .tf-circle{width:28px;height:28px;border-radius:50%;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:#9ca3af;}
    .key-btn-wrap{text-align:center;margin:40px 0 20px;}
    #toggle-key-btn{background:#0f766e;color:white;border:none;padding:12px 32px;font-size:1rem;font-weight:700;border-radius:8px;cursor:pointer;font-family:inherit;}
    #answer-key{display:none;background:#f0fdfa;border:2px solid #5eead4;border-radius:12px;padding:28px 32px;}
    #answer-key h2{color:#0f766e;border-left-color:#0d9488;margin-bottom:22px;}
    .key-section{margin-bottom:24px;}
    .key-section h3{font-size:1rem;font-weight:700;color:#0f766e;margin-bottom:12px;}
    .key-table{width:100%;border-collapse:collapse;font-size:0.88rem;margin-bottom:8px;}
    .key-table th{background:#0f766e;color:white;padding:8px 12px;font-size:0.8rem;}
    .key-table td{border:1px solid #d1d5db;padding:8px 12px;text-align:center;font-family:'Space Mono',monospace;}
    .key-table tr:nth-child(even) td{background:#f0fdfa;}
    .key-ans{color:#0d9488;font-weight:700;}
    .short-ans-key{background:white;border-radius:6px;padding:12px 16px;font-size:0.92rem;margin-bottom:10px;}
    .short-ans-key strong{color:#0d9488;}
  
  .ak-header{background:linear-gradient(135deg,#1e40af,#1d4ed8);color:white;border-radius:12px;padding:22px 28px;margin-bottom:28px;}
  .ak-header h1{font-size:1.3rem;margin:0;font-weight:800;}
  .ak-header p{margin:6px 0 0;opacity:.75;font-size:.88rem;}
  #answer-key{display:block!important;}
  </style>
</head>
<body>
  <div class="ak-header">
    <h1>🔑 Answer Key</h1>
    <p>Data Table — Homework</p>
  </div>
  <p>Answer key content not found.</p>
</body>
</html>
