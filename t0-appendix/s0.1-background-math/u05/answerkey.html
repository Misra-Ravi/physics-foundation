<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Factor-Label Conversion — Answer Key</title>
  <style>

    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito',sans-serif;background:#f0f4f8;background-image:radial-gradient(circle,#c7d2fe 1px,transparent 1px);background-size:28px 28px;color:#1a1a2e;font-size:16px;line-height:1.7;}
    header{background:linear-gradient(135deg,#065f46 0%,#059669 100%);color:white;padding:32px 60px 28px;}
    header .label{font-size:12px;text-transform:uppercase;letter-spacing:2px;opacity:0.85;margin-bottom:6px;}
    header h1{font-size:2rem;font-weight:800;margin-bottom:4px;}
    header .meta{opacity:0.85;font-size:0.9rem;}
    main{max-width:820px;margin:36px auto;padding:0 24px 60px;}
    .ref-box{background:white;border:2px solid #a7f3d0;border-radius:10px;padding:18px 22px;margin-bottom:28px;}
    .ref-box h3{color:#065f46;font-size:1rem;margin-bottom:10px;}
    .ref-box .tip{font-size:0.88rem;color:#374151;padding:8px 14px;background:#ecfdf5;border-left:4px solid #10b981;border-radius:4px;}
    section{margin-bottom:40px;}
    h2{font-size:1.2rem;font-weight:700;color:#065f46;border-left:5px solid #10b981;padding-left:12px;margin-bottom:16px;}
    .instructions{color:#4b5563;font-size:0.9rem;margin-bottom:16px;font-style:italic;}
    .conv-problem{background:white;border-radius:10px;padding:18px 22px;box-shadow:0 1px 5px rgba(0,0,0,0.07);margin-bottom:14px;}
    .conv-num{font-size:0.72rem;font-weight:700;text-transform:uppercase;color:#6b7280;margin-bottom:6px;}
    .conv-goal{font-size:0.95rem;font-weight:600;margin-bottom:8px;}
    .conv-hint{font-size:0.82rem;color:#64748b;margin-bottom:12px;font-style:italic;}
    .frac-chain{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
    .given-num{font-family:'Space Mono',monospace;font-size:1.2rem;font-weight:700;background:#f0fdf4;padding:6px 12px;border-radius:8px;color:#065f46;}
    .times-sign{font-size:1.1rem;color:#64748b;font-weight:700;}
    .blank-frac{border:2px dashed #d1d5db;border-radius:10px;padding:8px 14px;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:90px;}
    .blank-frac .top-line{border-bottom:2px solid #d1d5db;min-height:24px;width:80px;margin-bottom:4px;}
    .blank-frac .bot-line{min-height:24px;width:80px;}
    .equals-sign{font-size:1.1rem;color:#64748b;font-weight:700;}
    .result-box{border:2px dashed #d1d5db;border-radius:8px;min-height:38px;min-width:120px;padding:4px 12px;}
    .conv-steps{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
    .conv-step{display:flex;align-items:center;gap:8px;font-size:0.85rem;}
    .step-label{color:#6b7280;min-width:80px;}
    .fill-line{border-bottom:2px solid #d1d5db;min-height:24px;flex:1;display:inline-block;}
    .short-answer{background:white;border-radius:8px;padding:18px 22px;box-shadow:0 1px 5px rgba(0,0,0,0.07);margin-bottom:14px;}
    .short-answer .q{font-weight:600;margin-bottom:10px;font-size:0.95rem;}
    .write-lines{display:flex;flex-direction:column;gap:14px;}
    .write-line{border-bottom:2px solid #d1d5db;min-height:28px;width:100%;}
    .tf-card{background:white;border-radius:8px;padding:14px 20px;box-shadow:0 1px 5px rgba(0,0,0,0.07);margin-bottom:10px;display:flex;align-items:flex-start;gap:16px;}
    .tf-num{font-size:0.72rem;font-weight:700;text-transform:uppercase;color:#6b7280;min-width:30px;}
    .tf-stmt{flex:1;font-size:0.93rem;}
    .tf-circles{display:flex;gap:10px;flex-shrink:0;}
    .tf-circle{width:28px;height:28px;border-radius:50%;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:#9ca3af;}
    .key-btn-wrap{text-align:center;margin:40px 0 20px;}
    #toggle-key-btn{background:#065f46;color:white;border:none;padding:12px 32px;font-size:1rem;font-weight:700;border-radius:8px;cursor:pointer;font-family:inherit;}
    #answer-key{display:none;background:#f0fdf4;border:2px solid #6ee7b7;border-radius:12px;padding:28px 32px;}
    #answer-key h2{color:#065f46;border-left-color:#10b981;margin-bottom:22px;}
    .key-section{margin-bottom:24px;}
    .key-section h3{font-size:1rem;font-weight:700;color:#065f46;margin-bottom:12px;}
    .key-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .key-item{background:white;border-radius:6px;padding:10px 14px;font-size:0.92rem;}
    .key-item .kq{font-size:0.8rem;color:#6b7280;margin-bottom:2px;}
    .key-item .kans{color:#065f46;font-weight:700;font-family:'Space Mono',monospace;font-size:0.88rem;}
    .key-item .kexpl{color:#4b5563;font-size:0.8rem;margin-top:2px;}
    .short-ans-key{background:white;border-radius:6px;padding:12px 16px;font-size:0.92rem;margin-bottom:10px;}
    .short-ans-key strong{color:#065f46;}
  
  .ak-header{background:linear-gradient(135deg,#1e40af,#1d4ed8);color:white;border-radius:12px;padding:22px 28px;margin-bottom:28px;}
  .ak-header h1{font-size:1.3rem;margin:0;font-weight:800;}
  .ak-header p{margin:6px 0 0;opacity:.75;font-size:.88rem;}
  #answer-key{display:block!important;}
  </style>
</head>
<body>
  <div class="ak-header">
    <h1>🔑 Answer Key</h1>
    <p>Factor-Label Conversion — Homework</p>
  </div>
  <p>Answer key content not found.</p>
</body>
</html>
