<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Variables, Units &amp; Prefixes — Answer Key</title>
  <style>

    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito',sans-serif;background:#f0f4f8;background-image:radial-gradient(circle,#c7d2fe 1px,transparent 1px);background-size:28px 28px;color:#1a1a2e;font-size:16px;line-height:1.7;}
    header{background:linear-gradient(135deg,#4c1d95 0%,#7c3aed 100%);color:white;padding:32px 60px 28px;}
    header .label{font-size:12px;text-transform:uppercase;letter-spacing:2px;opacity:0.85;margin-bottom:6px;}
    header h1{font-size:2rem;font-weight:800;margin-bottom:4px;}
    header .meta{opacity:0.85;font-size:0.9rem;}
    main{max-width:820px;margin:36px auto;padding:0 24px 60px;}
    .ref-box{background:white;border:2px solid #ede9fe;border-radius:10px;padding:18px 22px;margin-bottom:36px;}
    .ref-box h3{color:#4c1d95;font-size:1rem;margin-bottom:12px;}
    .ref-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    @media(max-width:560px){.ref-grid{grid-template-columns:1fr;}}
    .ref-item{background:#faf5ff;border-radius:8px;padding:10px 14px;font-size:0.88rem;}
    .ref-item .sym{font-family:'Space Mono',monospace;font-weight:700;color:#7c3aed;font-size:1rem;}
    .ref-prefix{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px;}
    @media(max-width:560px){.ref-prefix{grid-template-columns:repeat(2,1fr);}}
    .ref-prefix .p-cell{background:#faf5ff;border-radius:6px;padding:6px 10px;font-size:0.82rem;text-align:center;}
    .ref-prefix .p-sym{font-family:'Space Mono',monospace;font-weight:700;color:#7c3aed;}
    .ref-box .tip{margin-top:12px;padding:10px 14px;background:#f3e8ff;border-left:4px solid #7c3aed;border-radius:4px;font-size:0.85rem;color:#4c1d95;}
    section{margin-bottom:44px;}
    h2{font-size:1.2rem;font-weight:700;color:#4c1d95;border-left:5px solid #7c3aed;padding-left:12px;margin-bottom:18px;}
    .instructions{color:#4b5563;font-size:0.9rem;margin-bottom:16px;font-style:italic;}
    .problem-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    @media(max-width:600px){.problem-grid{grid-template-columns:1fr;}}
    .problem-card{background:white;border-radius:8px;padding:16px 20px;box-shadow:0 1px 5px rgba(0,0,0,0.07);}
    .problem-num{font-size:0.72rem;font-weight:700;text-transform:uppercase;color:#6b7280;margin-bottom:4px;}
    .number-display{font-family:'Space Mono',monospace;font-size:1.6rem;font-weight:700;color:#1a1a2e;margin-bottom:8px;}
    .answer-line{border-bottom:2px solid #d1d5db;min-height:28px;width:200px;display:inline-block;}
    .problem-wide{background:white;border-radius:8px;padding:16px 20px;box-shadow:0 1px 5px rgba(0,0,0,0.07);margin-bottom:14px;}
    .field-set{display:flex;flex-direction:column;gap:8px;}
    .field-row{display:flex;align-items:center;gap:8px;font-size:0.88rem;}
    .short-line{border-bottom:2px solid #d1d5db;min-height:24px;width:100px;display:inline-block;}
    .long-line{border-bottom:2px solid #d1d5db;min-height:24px;width:200px;display:inline-block;}
    .two-fields{display:flex;gap:32px;flex-wrap:wrap;margin-top:10px;}
    /* true/false */
    .tf-card{background:white;border-radius:8px;padding:14px 20px;box-shadow:0 1px 5px rgba(0,0,0,0.07);margin-bottom:10px;display:flex;align-items:flex-start;gap:16px;}
    .tf-num{font-size:0.72rem;font-weight:700;text-transform:uppercase;color:#6b7280;min-width:30px;}
    .tf-stmt{flex:1;font-size:0.93rem;}
    .tf-circles{display:flex;gap:12px;flex-shrink:0;align-items:center;margin-top:2px;}
    .tf-circle{width:28px;height:28px;border-radius:50%;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:#9ca3af;}
    /* derived unit matching */
    .match-row{display:flex;align-items:center;gap:14px;margin-bottom:10px;flex-wrap:wrap;}
    .match-q{font-family:'Space Mono',monospace;font-size:1rem;font-weight:700;background:#f3f4f6;padding:6px 14px;border-radius:8px;min-width:140px;}
    .match-line{border-bottom:2px solid #d1d5db;min-height:24px;width:180px;display:inline-block;}
    /* short answer */
    .short-answer{background:white;border-radius:8px;padding:18px 22px;box-shadow:0 1px 5px rgba(0,0,0,0.07);margin-bottom:14px;}
    .short-answer .q{font-weight:600;margin-bottom:10px;font-size:0.95rem;}
    .write-lines{display:flex;flex-direction:column;gap:14px;}
    .write-line{border-bottom:2px solid #d1d5db;min-height:28px;width:100%;}
    /* answer key */
    .key-btn-wrap{text-align:center;margin:40px 0 20px;}
    #toggle-key-btn{background:#4c1d95;color:white;border:none;padding:12px 32px;font-size:1rem;font-weight:700;border-radius:8px;cursor:pointer;font-family:inherit;}
    #toggle-key-btn:hover{background:#5b21b6;}
    #answer-key{display:none;background:#faf5ff;border:2px solid #c4b5fd;border-radius:12px;padding:28px 32px;}
    #answer-key h2{color:#4c1d95;border-left-color:#7c3aed;margin-bottom:22px;}
    .key-section{margin-bottom:28px;}
    .key-section h3{font-size:1rem;font-weight:700;color:#4c1d95;margin-bottom:12px;}
    .key-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
    .key-item{background:white;border-radius:6px;padding:10px 14px;font-size:0.92rem;}
    .key-item .kq{font-size:0.82rem;color:#6b7280;margin-bottom:2px;}
    .key-item .kans{color:#5b21b6;font-weight:700;font-family:'Space Mono',monospace;}
    .key-item .kexpl{color:#4b5563;font-size:0.82rem;margin-top:2px;}
    .short-ans-key{background:white;border-radius:6px;padding:12px 16px;font-size:0.92rem;margin-bottom:10px;}
    .short-ans-key strong{color:#5b21b6;}
  
  .ak-header{background:linear-gradient(135deg,#1e40af,#1d4ed8);color:white;border-radius:12px;padding:22px 28px;margin-bottom:28px;}
  .ak-header h1{font-size:1.3rem;margin:0;font-weight:800;}
  .ak-header p{margin:6px 0 0;opacity:.75;font-size:.88rem;}
  #answer-key{display:block!important;}
  </style>
</head>
<body>
  <div class="ak-header">
    <h1>🔑 Answer Key</h1>
    <p>Variables, Units &amp; Prefixes — Homework</p>
  </div>
  <p>Answer key content not found.</p>
</body>
</html>
