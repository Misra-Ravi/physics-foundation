<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review of Trig — Finding Missing Sides: Answer Key</title>
  <style>

    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito',sans-serif;background:#f0fdf4;background-image:radial-gradient(circle,#86efac 1px,transparent 1px);background-size:28px 28px;color:#1a1a2e;font-size:16px;line-height:1.7;}
    header{background:linear-gradient(135deg,#14532d 0%,#15803d 50%,#16a34a 100%);color:white;padding:32px 60px 28px;}
    header .label{font-size:12px;text-transform:uppercase;letter-spacing:2px;opacity:0.85;margin-bottom:6px;}
    header h1{font-size:2rem;font-weight:800;margin-bottom:4px;}
    header .meta{opacity:0.85;font-size:0.9rem;}
    main{max-width:840px;margin:36px auto;padding:0 24px 60px;}

    /* reference box */
    .ref-box{background:white;border:2px solid #86efac;border-radius:12px;padding:20px 24px;margin-bottom:36px;}
    .ref-box h3{color:#14532d;font-size:1rem;font-weight:800;margin-bottom:14px;text-transform:uppercase;letter-spacing:0.5px;}
    .ref-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
    @media(max-width:620px){.ref-grid{grid-template-columns:1fr;}}
    .ref-tile{background:#f0fdf4;border-radius:8px;padding:12px 14px;border-left:4px solid #16a34a;text-align:center;}
    .ref-tile .rt-name{font-family:'Space Mono',monospace;font-size:1rem;font-weight:700;color:#14532d;margin-bottom:4px;}
    .ref-tile .rt-base{font-family:'Space Mono',monospace;font-size:0.82rem;color:#374151;margin-bottom:6px;}
    .ref-tile .rt-forms{font-size:0.78rem;color:#64748b;}
    .ref-tile .rt-forms span{display:block;font-family:'Space Mono',monospace;font-size:0.8rem;font-weight:700;color:#15803d;margin-top:2px;}

    section{margin-bottom:44px;}
    h2{font-size:1.2rem;font-weight:800;color:#14532d;border-left:5px solid #16a34a;padding-left:12px;margin-bottom:18px;}
    .instructions{color:#4b5563;font-size:0.9rem;margin-bottom:18px;font-style:italic;}

    /* problem cards */
    .problem-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
    @media(max-width:580px){.problem-grid{grid-template-columns:1fr;}}
    .problem-card{background:white;border-radius:10px;padding:18px 20px;box-shadow:0 2px 8px rgba(20,83,45,0.08);border-top:3px solid #86efac;}
    .problem-num{font-size:0.72rem;font-weight:800;text-transform:uppercase;color:#15803d;margin-bottom:8px;letter-spacing:0.5px;}
    .given-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
    .given-pill{background:#dcfce7;color:#15803d;font-family:'Space Mono',monospace;font-size:0.85rem;font-weight:700;padding:4px 11px;border-radius:14px;}
    .find-pill{background:#fef3c7;color:#92400e;font-family:'Space Mono',monospace;font-size:0.85rem;font-weight:700;padding:4px 11px;border-radius:14px;}
    .answer-block{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
    .answer-row{display:flex;align-items:center;gap:10px;font-size:0.88rem;color:#374151;}
    .answer-label{font-family:'Space Mono',monospace;font-weight:700;min-width:28px;color:#15803d;}
    .answer-line{border-bottom:2px solid #d1d5db;flex:1;min-height:22px;}
    .work-area{border:2px dashed #86efac;border-radius:8px;min-height:64px;margin-top:8px;padding:6px 10px;}
    .work-label{font-size:0.7rem;font-weight:800;color:#15803d;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px;}

    /* wide problem */
    .problem-wide{background:white;border-radius:10px;padding:20px 22px;box-shadow:0 2px 8px rgba(20,83,45,0.08);border-top:3px solid #86efac;margin-bottom:14px;}
    .problem-wide .problem-num{font-size:0.72rem;font-weight:800;text-transform:uppercase;color:#15803d;margin-bottom:10px;letter-spacing:0.5px;}

    /* short answer */
    .short-answer{background:white;border-radius:10px;padding:18px 22px;box-shadow:0 2px 8px rgba(0,0,0,0.06);margin-bottom:14px;}
    .short-answer .q{font-weight:700;margin-bottom:10px;font-size:0.95rem;}
    .write-lines{display:flex;flex-direction:column;gap:14px;}
    .write-line{border-bottom:2px solid #d1d5db;min-height:28px;width:100%;}

    /* multi-step */
    .multi-card{background:white;border-radius:12px;padding:22px 26px;box-shadow:0 3px 12px rgba(20,83,45,0.09);border:2px solid #bbf7d0;margin-bottom:16px;}
    .multi-card .mc-title{font-size:0.78rem;font-weight:800;text-transform:uppercase;color:#15803d;letter-spacing:0.5px;margin-bottom:10px;}
    .sub-steps{display:flex;flex-direction:column;gap:10px;margin-top:10px;}
    .sub-step{display:flex;gap:10px;align-items:flex-start;}
    .ss-label{font-size:0.8rem;font-weight:800;color:#15803d;min-width:60px;padding-top:2px;}
    .ss-line{border-bottom:2px solid #d1d5db;flex:1;min-height:26px;}

    /* answer key */
    .key-btn-wrap{text-align:center;margin:40px 0 20px;}
    #toggle-key-btn{background:#15803d;color:white;border:none;padding:12px 32px;font-size:1rem;font-weight:700;border-radius:8px;cursor:pointer;font-family:inherit;}
    #toggle-key-btn:hover{background:#14532d;}
    #answer-key{display:none;background:#f0fdf4;border:2px solid #86efac;border-radius:14px;padding:28px 32px;}
    #answer-key h2{color:#14532d;border-left-color:#16a34a;margin-bottom:22px;}
    .key-section{margin-bottom:28px;}
    .key-section h3{font-size:0.95rem;font-weight:800;color:#14532d;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px;}
    .key-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
    @media(max-width:560px){.key-grid{grid-template-columns:1fr;}}
    .key-item{background:white;border-radius:8px;padding:12px 16px;font-size:0.9rem;border-left:3px solid #16a34a;}
    .key-item .knum{font-size:0.72rem;font-weight:800;color:#15803d;text-transform:uppercase;margin-bottom:4px;}
    .key-item .kans{font-family:'Space Mono',monospace;font-weight:700;color:#14532d;font-size:0.95rem;}
    .key-item .kexpl{color:#64748b;font-size:0.8rem;margin-top:3px;}
    .key-note{background:white;border-radius:8px;padding:14px 18px;font-size:0.92rem;color:#374151;margin-bottom:10px;border-left:3px solid #16a34a;}
  
  .ak-header{background:linear-gradient(135deg,#1e40af,#1d4ed8);color:white;border-radius:12px;padding:22px 28px;margin-bottom:28px;}
  .ak-header h1{font-size:1.3rem;margin:0;font-weight:800;}
  .ak-header p{margin:6px 0 0;opacity:.75;font-size:.88rem;}
  #answer-key{display:block!important;}
  </style>
</head>
<body>
  <div class="ak-header">
    <h1>🔑 Answer Key</h1>
    <p>Review of Trig — Finding Missing Sides: Homework</p>
  </div>
  <p>Answer key content not found.</p>
</body>
</html>
