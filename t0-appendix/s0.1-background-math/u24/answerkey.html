<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review of Trig Sides — Answer Key | IB Physics</title>
  <style>

    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap');
    :root{--amber:#d97706;--amber-dark:#78350f;--amber-mid:#b45309;--dark:#1c1917;--bg:#fffbf5;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito','Segoe UI',sans-serif;background:var(--bg);color:var(--dark);font-size:17px;line-height:1.75;background-image:radial-gradient(circle,#fed7aa 1px,transparent 1px);background-size:28px 28px;}

    header{background:linear-gradient(135deg,#78350f 0%,#b45309 50%,#d97706 100%);color:white;padding:44px 60px 40px;position:relative;overflow:hidden;text-align:center;}
    header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 25% 50%,rgba(251,191,36,0.3) 0%,transparent 60%);pointer-events:none;}
    .star{position:absolute;border-radius:50%;background:rgba(255,255,255,0.9);animation:twinkle 3s infinite alternate;}
    @keyframes twinkle{from{opacity:0.2;transform:scale(1);}to{opacity:0.9;transform:scale(1.5);}}
    header .chip{display:inline-block;background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.35);border-radius:20px;padding:4px 16px;font-size:0.78rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;position:relative;}
    header h1{font-size:2.6rem;font-weight:900;position:relative;margin-bottom:8px;background:linear-gradient(90deg,#fef3c7,#fde68a,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    header .subtitle{font-size:1rem;color:rgba(255,255,255,0.8);position:relative;}

    main{max-width:860px;margin:44px auto;padding:0 24px 80px;}
    section{margin-bottom:56px;}
    .section-label{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
    .section-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
    .section-label h2{font-size:1.4rem;font-weight:900;color:var(--dark);}

    .prob-card{background:white;border-radius:16px;padding:22px 26px;box-shadow:0 3px 16px rgba(0,0,0,0.07);margin-bottom:18px;border-left:5px solid #d97706;}
    .prob-card h3{font-size:1rem;font-weight:900;color:#78350f;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
    .prob-badge{background:linear-gradient(135deg,#78350f,#d97706);color:white;border-radius:8px;padding:2px 10px;font-size:0.8rem;font-weight:800;}
    .prob-card p{font-size:0.95rem;color:#374151;margin-bottom:10px;}
    .prob-card .hint{font-size:0.83rem;color:#a8a29e;font-style:italic;}

    .diagram-inline{display:block;margin:12px auto;max-width:220px;}

    .answer-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:14px;}
    .answer-field{display:flex;flex-direction:column;gap:4px;}
    .answer-field label{font-size:0.8rem;font-weight:800;color:#78350f;text-transform:uppercase;letter-spacing:0.8px;}
    .answer-input{border:2px solid #fed7aa;border-radius:10px;padding:8px 14px;font-size:1rem;font-family:'Space Mono',monospace;font-weight:700;color:#78350f;background:#fffbf5;outline:none;width:140px;transition:border-color 0.2s;}
    .answer-input:focus{border-color:#d97706;background:white;}

    .btn-check{background:linear-gradient(135deg,#78350f,#d97706);color:white;border:none;border-radius:10px;padding:10px 22px;font-size:0.95rem;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:14px;transition:opacity 0.2s;}
    .btn-check:hover{opacity:0.88;}
    .btn-show{background:white;color:#78350f;border:2px solid #fbbf24;border-radius:10px;padding:8px 20px;font-size:0.9rem;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:10px;transition:all 0.2s;}
    .btn-show:hover{background:#fef3c7;}

    .feedback-msg{margin-top:10px;padding:10px 14px;border-radius:10px;font-size:0.9rem;font-weight:700;display:none;}
    .fb-ok{background:#dcfce7;color:#14532d;}
    .fb-err{background:#fee2e2;color:#991b1b;}

    .answer-key{background:#fef3c7;border:2px solid #fbbf24;border-radius:12px;padding:14px 18px;margin-top:12px;display:none;}
    .answer-key p{font-size:0.9rem;color:#78350f;margin-bottom:5px;}
    .answer-key p:last-child{margin-bottom:0;}
    .answer-key .mono{font-family:'Space Mono',monospace;font-weight:700;}
    .answer-key strong{color:#451a03;}

    .formula-ref{background:white;border-radius:16px;padding:18px 22px;box-shadow:0 2px 12px rgba(0,0,0,0.06);border-left:4px solid #d97706;margin-bottom:22px;display:flex;flex-wrap:wrap;gap:16px;align-items:center;}
    .formula-ref span{font-family:'Space Mono',monospace;font-size:0.92rem;font-weight:700;color:#78350f;background:#fef3c7;padding:4px 10px;border-radius:8px;}
    .formula-ref .ref-title{font-size:0.85rem;font-weight:800;color:#374151;width:100%;}

    /* EXTENDED PROBLEM */
    .ext-problem{background:linear-gradient(135deg,#fef9ee,#fef3c7);border-radius:18px;padding:26px 28px;box-shadow:0 4px 18px rgba(0,0,0,0.07);margin-bottom:20px;border:2px solid #fbbf24;}
    .ext-problem h3{font-size:1rem;font-weight:900;color:#78350f;margin-bottom:12px;}
    .ext-problem p{font-size:0.95rem;color:#374151;margin-bottom:8px;}
    .work-area{width:100%;border:2px solid #fed7aa;border-radius:10px;padding:10px 14px;font-size:0.95rem;font-family:'Nunito',sans-serif;color:#374151;background:#fffbf5;resize:vertical;min-height:90px;outline:none;margin-top:8px;}
    .work-area:focus{border-color:#d97706;background:white;}

    /* PASSWORD GATE */
    #gate{position:fixed;inset:0;background:linear-gradient(135deg,#78350f 0%,#b45309 50%,#d97706 100%);display:flex;align-items:center;justify-content:center;z-index:9999;}
    .gate-box{background:white;border-radius:24px;padding:40px 44px;max-width:420px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.35);}
    .gate-icon{font-size:3rem;margin-bottom:14px;}
    .gate-box h2{font-size:1.6rem;font-weight:900;color:#78350f;margin-bottom:8px;}
    .gate-box p{font-size:0.95rem;color:#78716c;margin-bottom:24px;}
    .gate-input{width:100%;border:2px solid #fed7aa;border-radius:12px;padding:12px 16px;font-size:1.1rem;font-family:'Space Mono',monospace;font-weight:700;color:#78350f;outline:none;text-align:center;transition:border-color 0.2s;}
    .gate-input:focus{border-color:#d97706;}
    .gate-btn{margin-top:16px;width:100%;background:linear-gradient(135deg,#78350f,#d97706);color:white;border:none;border-radius:12px;padding:13px;font-size:1.05rem;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:opacity 0.2s;}
    .gate-btn:hover{opacity:0.88;}
    .gate-error{color:#dc2626;font-size:0.88rem;margin-top:10px;font-weight:700;display:none;}

    .final-score{background:linear-gradient(135deg,#fef3c7,#fde68a);border:2px solid #fbbf24;border-radius:16px;padding:20px 24px;text-align:center;margin-top:28px;display:none;}
    .final-score p{font-size:1.15rem;font-weight:800;color:#78350f;}
  
  .ak-header{background:linear-gradient(135deg,#1e40af,#1d4ed8);color:white;border-radius:12px;padding:22px 28px;margin-bottom:28px;}
  .ak-header h1{font-size:1.3rem;margin:0;font-weight:800;}
  .ak-header p{margin:6px 0 0;opacity:.75;font-size:.88rem;}
  #answer-key{display:block!important;}
  </style>
</head>
<body>
  <div class="ak-header">
    <h1>🔑 Answer Key</h1>
    <p>Review of Trig Sides — Homework | IB Physics</p>
  </div>
  <p>Answer key content not found.</p>
</body>
</html>
