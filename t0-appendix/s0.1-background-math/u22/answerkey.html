<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finding X &amp; Y Components — Answer Key</title>
  <style>

    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito',sans-serif;background:#fff1f2;background-image:radial-gradient(circle,#fda4af 1px,transparent 1px);background-size:28px 28px;color:#1a1a2e;font-size:16px;line-height:1.7;}
    header{background:linear-gradient(135deg,#881337 0%,#be123c 50%,#e11d48 100%);color:white;padding:32px 60px 28px;}
    header .label{font-size:12px;text-transform:uppercase;letter-spacing:2px;opacity:0.85;margin-bottom:6px;}
    header h1{font-size:2rem;font-weight:800;margin-bottom:4px;}
    header .meta{opacity:0.85;font-size:0.9rem;}
    main{max-width:820px;margin:36px auto;padding:0 24px 60px;}
    .ref-box{background:white;border:2px solid #fecdd3;border-radius:12px;padding:20px 24px;margin-bottom:36px;}
    .ref-box h3{color:#881337;font-size:1rem;font-weight:800;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px;}
    .ref-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    @media(max-width:560px){.ref-grid{grid-template-columns:1fr;}}
    .ref-tile{background:#fff1f2;border-radius:8px;padding:12px 16px;border-left:4px solid #be123c;}
    .ref-tile .ref-label{font-size:0.75rem;font-weight:800;text-transform:uppercase;color:#9f1239;margin-bottom:4px;}
    .ref-tile .ref-formula{font-family:'Space Mono',monospace;font-size:0.95rem;font-weight:700;color:#881337;}
    .ref-tile .ref-note{font-size:0.78rem;color:#64748b;margin-top:3px;}
    .ref-tile-amber{border-left-color:#d97706;}
    .ref-tile-amber .ref-label{color:#92400e;}
    .ref-tile-amber .ref-formula{color:#b45309;}
    section{margin-bottom:44px;}
    h2{font-size:1.2rem;font-weight:800;color:#881337;border-left:5px solid #be123c;padding-left:12px;margin-bottom:18px;}
    .instructions{color:#4b5563;font-size:0.9rem;margin-bottom:18px;font-style:italic;}
    /* problem grid */
    .problem-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
    @media(max-width:580px){.problem-grid{grid-template-columns:1fr;}}
    .problem-card{background:white;border-radius:10px;padding:18px 20px;box-shadow:0 2px 8px rgba(190,18,60,0.07);border-top:3px solid #fda4af;}
    .problem-num{font-size:0.72rem;font-weight:800;text-transform:uppercase;color:#9f1239;margin-bottom:8px;letter-spacing:0.5px;}
    .given-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px;}
    .given-pill{background:#fecdd3;color:#881337;font-family:'Space Mono',monospace;font-size:0.88rem;font-weight:700;padding:4px 12px;border-radius:14px;}
    .given-pill-amber{background:#fef3c7;color:#92400e;}
    .angle-note{font-size:0.78rem;color:#9f1239;font-weight:700;margin-bottom:10px;}
    .angle-note-amber{color:#92400e;}
    .answer-block{display:flex;flex-direction:column;gap:8px;}
    .answer-row{display:flex;align-items:center;gap:10px;font-size:0.9rem;color:#374151;}
    .answer-label{font-family:'Space Mono',monospace;font-weight:700;min-width:30px;color:#881337;}
    .answer-label-amber{color:#b45309;}
    .answer-line{border-bottom:2px solid #d1d5db;flex:1;min-height:22px;}
    .show-work{margin-top:10px;padding:8px 12px;background:#fff1f2;border-radius:6px;font-size:0.78rem;color:#9f1239;font-style:italic;}
    .show-work-amber{background:#fffbeb;color:#92400e;}
    /* wide problem */
    .problem-wide{background:white;border-radius:10px;padding:20px 22px;box-shadow:0 2px 8px rgba(190,18,60,0.07);border-top:3px solid #fda4af;margin-bottom:14px;}
    .work-area{border:2px dashed #fecdd3;border-radius:8px;min-height:80px;margin-top:6px;padding:8px 12px;}
    .work-label{font-size:0.72rem;font-weight:800;color:#9f1239;text-transform:uppercase;letter-spacing:0.5px;margin-top:10px;margin-bottom:4px;}
    /* short answer */
    .short-answer{background:white;border-radius:10px;padding:18px 22px;box-shadow:0 2px 8px rgba(0,0,0,0.06);margin-bottom:14px;}
    .short-answer .q{font-weight:700;margin-bottom:10px;font-size:0.95rem;}
    .write-lines{display:flex;flex-direction:column;gap:14px;}
    .write-line{border-bottom:2px solid #d1d5db;min-height:28px;width:100%;}
    /* error analysis */
    .error-box{background:white;border-radius:10px;padding:20px 22px;box-shadow:0 2px 8px rgba(0,0,0,0.06);margin-bottom:14px;border-left:5px solid #ef4444;}
    .error-header{font-size:0.75rem;font-weight:800;text-transform:uppercase;color:#dc2626;margin-bottom:8px;letter-spacing:0.5px;}
    .error-work{font-family:'Space Mono',monospace;font-size:0.9rem;background:#fef2f2;padding:10px 14px;border-radius:8px;margin-bottom:10px;color:#374151;}
    /* answer key */
    .key-btn-wrap{text-align:center;margin:40px 0 20px;}
    #toggle-key-btn{background:#881337;color:white;border:none;padding:12px 32px;font-size:1rem;font-weight:700;border-radius:8px;cursor:pointer;font-family:inherit;}
    #toggle-key-btn:hover{background:#9f1239;}
    #answer-key{display:none;background:#fff1f2;border:2px solid #fda4af;border-radius:14px;padding:28px 32px;}
    #answer-key h2{color:#881337;border-left-color:#be123c;margin-bottom:22px;}
    .key-section{margin-bottom:28px;}
    .key-section h3{font-size:0.95rem;font-weight:800;color:#881337;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px;}
    .key-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
    @media(max-width:560px){.key-grid{grid-template-columns:1fr;}}
    .key-item{background:white;border-radius:8px;padding:12px 16px;font-size:0.9rem;border-left:3px solid #be123c;}
    .key-item .knum{font-size:0.72rem;font-weight:800;color:#9f1239;text-transform:uppercase;margin-bottom:4px;}
    .key-item .kans{font-family:'Space Mono',monospace;font-weight:700;color:#881337;font-size:1rem;}
    .key-item .kexpl{color:#64748b;font-size:0.8rem;margin-top:3px;}
    .key-note{background:white;border-radius:8px;padding:14px 18px;font-size:0.92rem;color:#374151;margin-bottom:10px;border-left:3px solid #be123c;}
    .points{float:right;font-size:0.72rem;font-weight:800;color:#9f1239;background:#fecdd3;padding:2px 8px;border-radius:10px;}
  
  .ak-header{background:linear-gradient(135deg,#1e40af,#1d4ed8);color:white;border-radius:12px;padding:22px 28px;margin-bottom:28px;}
  .ak-header h1{font-size:1.3rem;margin:0;font-weight:800;}
  .ak-header p{margin:6px 0 0;opacity:.75;font-size:.88rem;}
  #answer-key{display:block!important;}
  </style>
</head>
<body>
  <div class="ak-header">
    <h1>🔑 Answer Key</h1>
    <p>Finding X &amp; Y Components — Homework</p>
  </div>
  <p>Answer key content not found.</p>
</body>
</html>
