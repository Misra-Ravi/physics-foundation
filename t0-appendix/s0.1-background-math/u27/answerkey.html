<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Vectors — Answer Key</title>
  <style>

    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito',sans-serif;background:#f0f4f8;background-image:radial-gradient(circle,#c7d2fe 1px,transparent 1px);background-size:28px 28px;color:#1a1a2e;font-size:16px;line-height:1.7;}
    header{background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#334155 100%);color:white;padding:32px 60px 28px;position:relative;overflow:hidden;}
    header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 25% 50%,rgba(99,102,241,0.25) 0%,transparent 60%),radial-gradient(ellipse at 75% 30%,rgba(20,184,166,0.2) 0%,transparent 55%);pointer-events:none;}
    header .label{font-size:12px;text-transform:uppercase;letter-spacing:2px;opacity:0.75;margin-bottom:6px;position:relative;}
    header h1{font-size:2rem;font-weight:800;margin-bottom:4px;position:relative;}
    header .meta{opacity:0.8;font-size:0.9rem;position:relative;}
    main{max-width:820px;margin:36px auto;padding:0 24px 60px;}
    .ref-box{background:white;border:2px solid #e0e7ff;border-radius:10px;padding:16px 22px;margin-bottom:32px;}
    .ref-box .ref-title{font-size:0.82rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#4338ca;margin-bottom:10px;}
    .ref-pair{display:flex;gap:28px;flex-wrap:wrap;}
    .ref-item{display:flex;align-items:center;gap:10px;}
    .ref-sym{font-size:2rem;width:38px;text-align:center;}
    .ref-text{font-size:0.9rem;color:#334155;}
    .ref-text strong{display:block;}
    section{margin-bottom:44px;}
    h2{font-size:1.2rem;font-weight:800;color:#0f172a;border-left:5px solid #6366f1;padding-left:12px;margin-bottom:16px;}
    .instructions{color:#4b5563;font-size:0.9rem;margin-bottom:16px;font-style:italic;}
    .answer-line{border-bottom:2px solid #d1d5db;min-height:26px;width:90%;display:inline-block;}
    .answer-label{font-size:0.82rem;color:#6b7280;margin-right:6px;}
    /* cards */
    .prob-card{background:white;border-radius:10px;padding:18px 22px;box-shadow:0 1px 5px rgba(0,0,0,0.07);margin-bottom:14px;}
    .pnum{font-size:0.72rem;font-weight:700;text-transform:uppercase;color:#94a3b8;margin-bottom:6px;}
    .ptext{font-weight:700;font-size:0.95rem;margin-bottom:10px;}
    .psub{font-size:0.85rem;color:#64748b;margin-bottom:10px;}
    .write-lines{display:flex;flex-direction:column;gap:14px;}
    .write-line{border-bottom:2px solid #d1d5db;min-height:26px;width:100%;}
    /* symbol choice grid */
    .sym-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    @media(max-width:560px){.sym-grid{grid-template-columns:1fr;}}
    .sym-card{background:white;border-radius:10px;padding:16px 18px;box-shadow:0 1px 5px rgba(0,0,0,0.07);text-align:center;}
    .sym-card .sym-num{font-size:0.72rem;font-weight:700;text-transform:uppercase;color:#94a3b8;margin-bottom:8px;}
    .sym-card .sym-scenario{font-size:0.9rem;font-weight:700;margin-bottom:12px;text-align:left;}
    .sym-card .sym-choices{display:flex;gap:16px;justify-content:center;}
    .sym-choice{display:flex;flex-direction:column;align-items:center;gap:4px;}
    .sym-choice .sym-label{font-size:0.75rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;}
    .sym-choice .sym-box{width:44px;height:44px;border-radius:8px;border:2px solid #e2e8f0;display:flex;align-items:center;justify-content:center;font-size:1.6rem;background:#f8fafc;}
    .sym-choice .sym-line{border-bottom:2px solid #d1d5db;width:60px;margin-top:4px;}
    /* field pattern analysis */
    .pattern-card{background:white;border-radius:10px;padding:18px 22px;box-shadow:0 1px 5px rgba(0,0,0,0.07);margin-bottom:14px;}
    .pc-num{font-size:0.72rem;font-weight:700;text-transform:uppercase;color:#94a3b8;margin-bottom:6px;}
    .pc-text{font-weight:700;font-size:0.95rem;margin-bottom:8px;}
    .pc-sub{font-size:0.85rem;color:#64748b;margin-bottom:14px;}
    .mini-scene{display:grid;grid-template-columns:1fr 12px 1fr;border-radius:8px;overflow:hidden;border:1.5px solid #e2e8f0;max-width:400px;margin-bottom:12px;}
    .ms-left{padding:12px;text-align:center;}
    .ms-wire{background:#334155;}
    .ms-right{padding:12px;text-align:center;}
    .ms-label{font-size:0.68rem;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:7px;}
    .mini-field{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;}
    .mf{height:30px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;border-radius:4px;}
    .mf-dot{background:#f0fdf4;color:#166534;}.mf-cross{background:#fff7ed;color:#92400e;}
    /* diagram drawing task */
    .draw-task{background:white;border-radius:10px;padding:18px 22px;box-shadow:0 1px 5px rgba(0,0,0,0.07);margin-bottom:14px;}
    .dt-num{font-size:0.72rem;font-weight:700;text-transform:uppercase;color:#94a3b8;margin-bottom:6px;}
    .dt-text{font-weight:700;font-size:0.95rem;margin-bottom:8px;}
    .dt-sub{font-size:0.85rem;color:#64748b;margin-bottom:14px;}
    .blank-scene{display:grid;grid-template-columns:1fr 14px 1fr;border-radius:8px;overflow:hidden;border:2px dashed #cbd5e1;max-width:420px;}
    .bs-left{background:#f8fafc;padding:14px;text-align:center;}
    .bs-wire{background:#334155;}
    .bs-right{background:#f8fafc;padding:14px;text-align:center;}
    .bs-label{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#94a3b8;margin-bottom:8px;}
    .blank-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
    .blank-cell{border:1.5px dashed #cbd5e1;border-radius:5px;height:34px;background:white;}
    /* IB exam-style MCQ */
    .mcq-card{background:white;border-radius:10px;padding:18px 22px;box-shadow:0 1px 5px rgba(0,0,0,0.07);margin-bottom:14px;}
    .mcq-num{font-size:0.72rem;font-weight:700;text-transform:uppercase;color:#94a3b8;margin-bottom:6px;}
    .mcq-stem{font-weight:700;font-size:0.95rem;margin-bottom:12px;line-height:1.55;}
    .mcq-options{display:flex;flex-direction:column;gap:8px;}
    .mcq-opt{display:flex;gap:10px;align-items:flex-start;font-size:0.92rem;}
    .mcq-let{font-weight:800;min-width:20px;color:#6366f1;}
    .mcq-circle{width:18px;height:18px;border-radius:50%;border:2px solid #cbd5e1;flex-shrink:0;margin-top:2px;}
    .mcq-text{color:#374151;}
    /* answer key */
    .key-btn-wrap{text-align:center;margin:40px 0 20px;}
    #toggle-key-btn{background:linear-gradient(135deg,#4338ca,#6366f1);color:white;border:none;padding:12px 32px;font-size:1rem;font-weight:700;border-radius:8px;cursor:pointer;font-family:inherit;}
    #toggle-key-btn:hover{opacity:0.9;}
    #answer-key{display:none;background:#f5f3ff;border:2px solid #c4b5fd;border-radius:14px;padding:28px 32px;}
    #answer-key h2{border-left-color:#7c3aed;margin-bottom:22px;}
    .key-section{margin-bottom:26px;}
    .key-section h3{font-size:0.95rem;font-weight:800;color:#4338ca;margin-bottom:12px;}
    .key-text{background:white;border-radius:8px;padding:12px 16px;font-size:0.9rem;margin-bottom:10px;}
    .key-text strong{color:#4338ca;}
    .key-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
    @media(max-width:500px){.key-grid{grid-template-columns:1fr;}}
    .key-item{background:white;border-radius:8px;padding:10px 14px;font-size:0.9rem;}
    .key-item .knum{font-weight:700;color:#64748b;font-size:0.8rem;display:block;margin-bottom:2px;}
    .key-item .kans{color:#4338ca;font-weight:800;font-size:1rem;}
    .key-item .kexpl{color:#4b5563;font-size:0.8rem;margin-top:3px;}
  
  .ak-header{background:linear-gradient(135deg,#1e40af,#1d4ed8);color:white;border-radius:12px;padding:22px 28px;margin-bottom:28px;}
  .ak-header h1{font-size:1.3rem;margin:0;font-weight:800;}
  .ak-header p{margin:6px 0 0;opacity:.75;font-size:.88rem;}
  #answer-key{display:block!important;}
  </style>
</head>
<body>
  <div class="ak-header">
    <h1>🔑 Answer Key</h1>
    <p>3D Vectors — Homework</p>
  </div>
  <p>Answer key content not found.</p>
</body>
</html>
