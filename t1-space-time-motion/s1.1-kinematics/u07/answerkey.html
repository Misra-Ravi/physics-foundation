<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit 7 — VT Graphs Part 2 — Answer Key</title>
  <style>

  :root{
    --blue:#3b82f6;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;
    --dark:#0f172a;--bg:#f8faff;--muted:#94a3b8;
    --radius:14px;--shadow:0 4px 24px rgba(0,0,0,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Nunito',sans-serif;
    background-color:var(--bg);
    background-image:radial-gradient(circle,#c7d2fe 1px,transparent 1px);
    background-size:28px 28px;
    color:var(--dark);min-height:100vh;
  }
  /* Gate */
  #gate{
    position:fixed;inset:0;z-index:9999;
    display:flex;align-items:center;justify-content:center;
    background:rgba(15,23,42,.85);backdrop-filter:blur(6px);
  }
  .gate-card{
    background:#fff;border-radius:20px;padding:2.5rem 2rem;
    width:min(360px,92vw);text-align:center;
    box-shadow:0 8px 40px rgba(0,0,0,.25);
  }
  .gate-card h2{font-size:1.4rem;margin-bottom:.5rem;}
  .gate-card p{color:var(--muted);font-size:.95rem;margin-bottom:1.4rem;}
  .gate-card input{
    width:100%;padding:.7rem 1rem;border:2px solid #e2e8f0;border-radius:10px;
    font-family:'Space Mono',monospace;font-size:1rem;margin-bottom:.8rem;outline:none;transition:border-color .2s;
  }
  .gate-card input:focus{border-color:var(--blue);}
  .gate-card button{
    width:100%;padding:.75rem;background:var(--blue);color:#fff;
    border:none;border-radius:10px;font-family:'Nunito',sans-serif;
    font-size:1rem;font-weight:700;cursor:pointer;
  }
  #gate-err{color:var(--red);font-size:.875rem;min-height:1.2em;margin-top:.3rem;}
  /* Header */
  header{
    background:linear-gradient(135deg,#1e40af 0%,#2563eb 100%);
    color:#fff;padding:2.5rem 2rem 2rem;position:relative;overflow:hidden;
  }
  .chip{
    display:inline-block;background:rgba(255,255,255,.18);
    border:1px solid rgba(255,255,255,.35);border-radius:999px;
    font-size:.78rem;font-weight:700;letter-spacing:.08em;
    padding:.28rem .9rem;margin-bottom:.8rem;text-transform:uppercase;
  }
  header h1{
    font-size:clamp(1.4rem,3.5vw,2rem);font-weight:900;line-height:1.2;color:#fff;margin-bottom:.4rem;
  }
  header .type-badge{
    display:inline-block;background:#f59e0b;color:#78350f;
    border-radius:999px;font-size:.8rem;font-weight:800;
    padding:.25rem .9rem;margin-bottom:.7rem;
  }
  .info-bar{display:flex;flex-wrap:wrap;gap:1rem;margin-top:1.2rem;}
  .info-field{flex:1;min-width:140px;}
  .info-field label{display:block;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.6);margin-bottom:.3rem;}
  .info-field .line{border:none;border-bottom:2px solid rgba(255,255,255,.5);width:100%;height:28px;background:transparent;}
  /* Layout */
  main{max-width:860px;margin:0 auto;padding:2.5rem 1.25rem 4rem;}
  /* Ref + Tip */
  .ref-box{
    background:linear-gradient(135deg,#eff6ff,#dbeafe);
    border:2px solid #93c5fd;border-radius:var(--radius);
    padding:1.2rem 1.5rem;margin-bottom:1rem;
  }
  .ref-box h3{font-size:.9rem;font-weight:800;color:#1d4ed8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.8rem;}
  .ref-grid{display:flex;flex-wrap:wrap;gap:.6rem;}
  .ref-pill{background:#fff;border:1.5px solid #93c5fd;border-radius:9px;padding:.4rem .9rem;font-family:'Space Mono',monospace;font-size:.85rem;font-weight:700;color:#1d4ed8;}
  .tip-box{
    background:#fef3c7;border:2px solid #f59e0b;border-radius:var(--radius);
    padding:1rem 1.4rem;margin-bottom:2rem;
    display:flex;gap:.8rem;align-items:flex-start;
  }
  .tip-icon{font-size:1.3rem;flex-shrink:0;margin-top:.05rem;}
  .tip-box p{font-size:.93rem;line-height:1.5;}
  /* Part headers */
  .part-header{display:flex;align-items:center;gap:.75rem;margin:2rem 0 1.1rem;}
  .part-badge{background:var(--blue);color:#fff;border-radius:10px;font-size:.85rem;font-weight:800;padding:.3rem .9rem;white-space:nowrap;}
  .part-badge.green{background:var(--green);}
  .part-badge.amber{background:var(--amber);color:#78350f;}
  .part-badge.red{background:var(--red);}
  .part-header h2{font-size:1.1rem;font-weight:800;}
  /* Problem cards */
  .prob-card{
    background:#fff;border-radius:var(--radius);padding:1.3rem 1.5rem;
    box-shadow:var(--shadow);margin-bottom:1rem;border-left:4px solid var(--blue);
  }
  .prob-card.green{border-left-color:var(--green);}
  .prob-card.amber{border-left-color:var(--amber);}
  .prob-card.red{border-left-color:var(--red);}
  .prob-card.purple{border-left-color:#8b5cf6;}
  .prob-num{
    display:inline-block;background:var(--blue);color:#fff;border-radius:50%;
    width:1.6rem;height:1.6rem;font-size:.8rem;font-weight:800;text-align:center;line-height:1.6rem;
    margin-right:.5rem;vertical-align:middle;
  }
  .prob-num.green{background:var(--green);}
  .prob-num.amber{background:var(--amber);}
  .prob-num.red{background:var(--red);}
  .prob-num.purple{background:#8b5cf6;}
  .prob-q{font-size:.97rem;line-height:1.6;margin-bottom:.8rem;font-weight:600;}
  /* Work lines */
  .work-lines{display:flex;flex-direction:column;gap:.6rem;margin-top:.6rem;}
  .work-line{border:none;border-bottom:1.5px solid #e2e8f0;height:36px;background:transparent;width:100%;font-family:'Nunito',sans-serif;font-size:.93rem;color:var(--dark);outline:none;padding:0 .2rem;}
  .work-box{
    border:2px dashed #cbd5e1;border-radius:10px;
    height:90px;background:#f8faff;
    display:flex;align-items:center;justify-content:center;
    color:var(--muted);font-size:.82rem;margin-top:.6rem;
  }
  .ans-line-wrap{margin-top:.7rem;}
  .ans-line-wrap label{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);}
  .ans-line{border:none;border-bottom:2.5px solid var(--blue);width:100%;height:32px;background:transparent;font-family:'Space Mono',monospace;font-size:1rem;font-weight:700;color:var(--blue);outline:none;margin-top:.2rem;}
  /* True/False */
  .tf-item{
    background:#fff;border-radius:var(--radius);padding:1.1rem 1.4rem;
    box-shadow:var(--shadow);margin-bottom:1rem;border-left:4px solid var(--green);
  }
  .tf-item.f{border-left-color:var(--red);}
  .tf-statement{font-size:.97rem;font-weight:600;margin-bottom:.6rem;}
  .tf-options{display:flex;gap:2rem;margin-bottom:.5rem;}
  .tf-options label{display:flex;align-items:center;gap:.45rem;font-weight:700;font-size:.95rem;cursor:pointer;}
  .tf-options input{accent-color:var(--blue);width:1.1rem;height:1.1rem;}
  .corr-label{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-top:.4rem;display:block;}
  .corr-line{border:none;border-bottom:1.5px solid #e2e8f0;width:100%;height:30px;background:transparent;font-family:'Nunito',sans-serif;font-size:.9rem;outline:none;}
  /* Challenge box */
  .challenge-banner{
    background:linear-gradient(135deg,#f5f3ff,#ede9fe);
    border:2px solid #8b5cf6;border-radius:var(--radius);
    padding:1rem 1.4rem;margin-bottom:1rem;
    display:flex;gap:.7rem;align-items:flex-start;
  }
  .chall-icon{font-size:1.2rem;flex-shrink:0;}
  .chall-text{font-size:.9rem;line-height:1.5;color:#4c1d95;font-weight:600;}
  /* Answer key */
  #answer-key{
    display:none;margin-top:2.5rem;background:#fff;border-radius:var(--radius);
    border:3px solid var(--green);padding:1.6rem 1.8rem;box-shadow:var(--shadow);
  }
  #answer-key h2{font-size:1.1rem;font-weight:800;color:var(--green);margin-bottom:1.2rem;}
  .ak-section{margin-bottom:1.4rem;}
  .ak-section h3{font-size:.88rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.6rem;}
  .ak-item{display:flex;gap:.7rem;align-items:flex-start;background:#f0fdf4;border-radius:8px;padding:.55rem .8rem;margin-bottom:.5rem;font-size:.93rem;}
  .ak-num{font-weight:800;color:var(--green);min-width:2rem;}
  .ak-work{font-family:'Space Mono',monospace;font-size:.82rem;color:#374151;margin-top:.25rem;}
  .ak-item.red-bg{background:#fff1f2;}
  .ak-item.red-bg .ak-num{color:var(--red);}
  #toggle-key-btn{
    display:block;margin:2rem auto 0;
    padding:.7rem 2rem;background:#fff;color:var(--green);
    border:2px solid var(--green);border-radius:10px;
    font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;
  }
  #toggle-key-btn:hover{background:var(--green);color:#fff;}
  .mono{font-family:'Space Mono',monospace;font-weight:700;}
  svg.prob-graph{display:block;max-width:100%;height:auto;margin:.6rem 0;}
  @media(max-width:520px){header{padding:1.8rem 1rem 1.5rem;}}

  .ak-header{background:linear-gradient(135deg,#1e40af,#1d4ed8);color:white;border-radius:12px;padding:22px 28px;margin-bottom:28px;}
  .ak-header h1{font-size:1.3rem;margin:0;font-weight:800;}
  .ak-header p{margin:6px 0 0;opacity:.75;font-size:.88rem;}
  #answer-key{display:block!important;}
  </style>
</head>
<body>
  <div class="ak-header">
    <h1>🔑 Answer Key</h1>
    <p>Unit 7 — VT Graphs Part 2 — Homework</p>
  </div>
  <p>Answer key content not found.</p>
</body>
</html>
