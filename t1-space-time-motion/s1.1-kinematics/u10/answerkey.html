<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit 10 · Kinematics Transition — Answer Key</title>
  <style>

  :root{
    --blue:#3b82f6;
    --green:#22c55e;
    --amber:#f59e0b;
    --red:#ef4444;
    --dark:#0f172a;
    --bg:#f8faff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Nunito',sans-serif;
    background-color:var(--bg);
    background-image:radial-gradient(circle,#cbd5e1 1px,transparent 1px);
    background-size:28px 28px;
    color:var(--dark);
    min-height:100vh;
  }

  /* GATE */
  #gate{
    position:fixed;inset:0;
    background:linear-gradient(135deg,#0f172a,#1e3a5f);
    display:flex;align-items:center;justify-content:center;
    z-index:9999;
  }
  .gate-card{
    background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.15);
    border-radius:20px;padding:48px 56px;
    text-align:center;max-width:420px;width:90%;
  }
  .gate-card h2{color:#e2e8f0;font-size:1.5rem;margin-bottom:8px;}
  .gate-card p{color:#94a3b8;font-size:.9rem;margin-bottom:28px;}
  .gate-card input{
    width:100%;padding:12px 16px;border-radius:10px;
    border:1px solid rgba(255,255,255,.2);
    background:rgba(255,255,255,.1);color:#f1f5f9;
    font-family:'Space Mono',monospace;font-size:1rem;
    outline:none;margin-bottom:16px;text-align:center;letter-spacing:3px;
  }
  .gate-card input::placeholder{letter-spacing:normal;color:#64748b;}
  .gate-btn{
    width:100%;padding:13px;
    background:linear-gradient(135deg,#3b82f6,#1d4ed8);
    color:#fff;border:none;border-radius:10px;
    font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;
    cursor:pointer;transition:opacity .2s;
  }
  .gate-btn:hover{opacity:.85;}
  .gate-err{color:#f87171;font-size:.85rem;margin-top:12px;min-height:20px;}

  /* HERO */
  .hero{
    background:linear-gradient(135deg,#1e40af 0%,#2563eb 100%);
    padding:52px 24px 44px;
    text-align:center;
    position:relative;overflow:hidden;
  }
  .chip{
    display:inline-block;
    background:rgba(255,255,255,.15);
    border:1px solid rgba(255,255,255,.25);
    border-radius:999px;padding:5px 18px;
    color:#bfdbfe;font-family:'Space Mono',monospace;
    font-size:.75rem;letter-spacing:.08em;margin-bottom:18px;
  }
  .hero h1{
    font-size:clamp(1.6rem,4vw,2.4rem);
    font-weight:900;
    background:linear-gradient(90deg,#bfdbfe,#ffffff,#bfdbfe);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;line-height:1.2;
    max-width:680px;margin:0 auto 10px;
  }
  .hero-sub{color:#93c5fd;font-size:.95rem;font-weight:600;}

  /* NAME BAR */
  .name-bar{
    background:#fff;border-bottom:2px solid #e2e8f0;
    padding:18px 24px;
    display:flex;flex-wrap:wrap;gap:16px;
    max-width:960px;margin:0 auto;
  }
  .name-field{display:flex;align-items:center;gap:8px;flex:1;min-width:160px;}
  .name-field label{
    font-size:.8rem;font-weight:700;color:#64748b;
    text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;
  }
  .name-field input{
    flex:1;border:none;border-bottom:2px solid #e2e8f0;
    background:transparent;padding:4px 6px;
    font-family:'Nunito',sans-serif;font-size:.95rem;color:var(--dark);
    outline:none;transition:border-color .2s;
  }
  .name-field input:focus{border-bottom-color:var(--blue);}

  /* MAIN */
  .main{max-width:960px;margin:0 auto;padding:32px 20px 80px;}

  /* REF BOX */
  .ref-box{
    background:linear-gradient(135deg,#0f172a,#1e40af);
    border-radius:14px;padding:20px 24px;margin-bottom:32px;
    display:flex;flex-wrap:wrap;gap:16px;
    align-items:center;justify-content:center;
  }
  .ref-item{
    text-align:center;padding:10px 20px;
    background:rgba(255,255,255,.08);
    border-radius:10px;border:1px solid rgba(255,255,255,.12);
  }
  .ref-item .ref-lbl{
    font-family:'Space Mono',monospace;font-size:.65rem;
    text-transform:uppercase;letter-spacing:.1em;color:#93c5fd;margin-bottom:6px;
  }
  .ref-item .ref-eq{
    font-family:'Space Mono',monospace;font-size:.95rem;font-weight:700;color:#fff;
  }

  /* SECTION HEADERS */
  .sec-head{
    display:flex;align-items:center;gap:10px;
    margin:36px 0 16px;padding-bottom:10px;
    border-bottom:2px solid #e2e8f0;
  }
  .sec-badge{
    background:linear-gradient(135deg,#2563eb,#1e40af);
    color:#fff;border-radius:8px;
    padding:4px 14px;font-family:'Space Mono',monospace;
    font-size:.75rem;font-weight:700;
  }
  .sec-head h2{font-size:1.1rem;font-weight:800;}

  /* PROBLEM CARDS */
  .prob-card{
    background:#fff;border-radius:14px;
    border:1px solid #e2e8f0;padding:22px 24px;
    margin-bottom:16px;
    box-shadow:0 1px 6px rgba(15,23,42,.05);
  }
  .prob-num{
    font-family:'Space Mono',monospace;font-size:.72rem;font-weight:700;
    text-transform:uppercase;letter-spacing:.08em;color:#64748b;margin-bottom:8px;
  }
  .prob-text{font-size:.94rem;line-height:1.75;color:#1e293b;}

  /* WORKSPACE */
  .workspace{
    margin-top:14px;border:1.5px dashed #cbd5e1;border-radius:8px;
    min-height:90px;
    background:repeating-linear-gradient(transparent,transparent 28px,#e2e8f0 28px,#e2e8f0 29px);
    padding:8px 12px;
  }
  .workspace-lbl{font-size:.72rem;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:.06em;}

  /* GRAPH PLACEHOLDER */
  .graph-placeholder{
    margin-top:14px;display:grid;
    grid-template-columns:1fr 1fr;gap:14px;
  }
  .gp-box{
    border:1.5px dashed #cbd5e1;border-radius:8px;background:#fafafa;
    min-height:100px;
    display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:6px;
  }
  .gp-label{font-size:.72rem;color:#94a3b8;font-weight:700;text-align:center;}

  /* MULTIPLE CHOICE */
  .mc-opts{display:flex;flex-direction:column;gap:6px;margin-top:12px;}
  .mc-opt{
    display:flex;align-items:flex-start;gap:8px;font-size:.9rem;color:#1e293b;
    padding:8px 12px;border:1.5px solid #e2e8f0;border-radius:8px;background:#fafafa;
  }
  .mc-opt span{flex-shrink:0;font-family:'Space Mono',monospace;font-weight:700;color:#64748b;font-size:.8rem;}

  /* TF */
  .tf-block{
    display:flex;flex-direction:column;gap:10px;margin-top:8px;
  }
  .tf-item{
    display:flex;align-items:flex-start;gap:12px;
    padding:12px 16px;
    border:1.5px solid #e2e8f0;border-radius:10px;
    background:#fafafa;
  }
  .tf-circles{
    display:flex;gap:8px;flex-shrink:0;margin-top:2px;
  }
  .tf-circle{
    width:28px;height:28px;border-radius:50%;
    border:2px solid #cbd5e1;
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Mono',monospace;font-size:.72rem;font-weight:700;
    color:#64748b;flex-shrink:0;cursor:pointer;
    transition:background .2s,border-color .2s;
  }
  .tf-circle:hover{background:#f1f5f9;}
  .tf-text{font-size:.91rem;line-height:1.65;}

  /* SHORT ANSWER */
  .sa-line{
    margin-top:10px;border:none;border-bottom:1.5px solid #cbd5e1;
    background:transparent;width:100%;padding:6px 4px;
    font-family:'Nunito',sans-serif;font-size:.93rem;color:var(--dark);
    outline:none;display:block;
  }
  .sa-line:focus{border-bottom-color:var(--blue);}

  /* CHALLENGE */
  .challenge-box{
    background:linear-gradient(135deg,#fffbeb,#fef9c3);
    border:1.5px solid #fde68a;border-radius:12px;
    padding:16px 18px;margin-bottom:14px;
    font-size:.85rem;color:#78350f;font-weight:700;
  }

  /* ANSWER KEY */
  .ak-toggle{
    display:flex;align-items:center;justify-content:space-between;
    cursor:pointer;user-select:none;
    background:linear-gradient(135deg,#0f172a,#1e40af);
    color:#fff;border-radius:12px;
    padding:14px 22px;margin-top:40px;
  }
  .ak-toggle span{font-weight:800;font-size:1rem;}
  .ak-toggle .ak-arrow{font-size:1.2rem;transition:transform .3s;}
  .ak-toggle.open .ak-arrow{transform:rotate(180deg);}
  .ak-body{
    display:none;background:#fff;
    border:1.5px solid #e2e8f0;
    border-top:none;border-radius:0 0 12px 12px;padding:24px;
  }
  .ak-body.visible{display:block;}
  .ak-item{margin-bottom:18px;}
  .ak-item h4{
    font-family:'Space Mono',monospace;font-size:.75rem;
    text-transform:uppercase;letter-spacing:.08em;color:#64748b;margin-bottom:6px;
  }
  .ak-item p{font-size:.9rem;line-height:1.75;color:#1e293b;}
  .ak-item .ans{
    display:inline-block;background:#f0fdf4;
    border:1px solid #bbf7d0;border-radius:6px;
    padding:2px 10px;font-family:'Space Mono',monospace;
    font-size:.85rem;font-weight:700;color:#166534;margin-right:6px;
  }
  .ak-item .tf-ans{
    display:inline-block;padding:2px 10px;border-radius:6px;
    font-family:'Space Mono',monospace;font-size:.85rem;font-weight:700;margin-right:6px;
  }
  .tf-ans.true{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;}
  .tf-ans.false{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;}
  .ak-divider{border:none;border-top:1px solid #e2e8f0;margin:16px 0;}

  .ak-header{background:linear-gradient(135deg,#1e40af,#1d4ed8);color:white;border-radius:12px;padding:22px 28px;margin-bottom:28px;}
  .ak-header h1{font-size:1.3rem;margin:0;font-weight:800;}
  .ak-header p{margin:6px 0 0;opacity:.75;font-size:.88rem;}
  #answer-key{display:block!important;}
  </style>
</head>
<body>
  <div class="ak-header">
    <h1>🔑 Answer Key</h1>
    <p>Unit 10 · Kinematics Transition — Homework</p>
  </div>
  <p>Answer key content not found.</p>
</body>
</html>
