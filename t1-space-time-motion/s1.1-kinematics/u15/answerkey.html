<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit 15 Answer Key – Air Resistance</title>
  <style>

  :root{
    --blue:#3b82f6;--indigo:#6366f1;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;
    --dark:#0f172a;--bg:#f8faff;--muted:#94a3b8;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:radial-gradient(circle,#cbd5e1 1px,transparent 1px);
    background-size:28px 28px;opacity:.55;}

  #gate{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#1e40af,#2563eb);}
  #gate .box{background:#fff;border-radius:20px;padding:2.5rem 2rem;max-width:360px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.35);}
  #gate h2{font-size:1.5rem;font-weight:800;margin-bottom:.4rem;color:var(--dark);}
  #gate p{color:var(--muted);font-size:.9rem;margin-bottom:1.2rem;}
  #gate input{width:100%;padding:.75rem 1rem;border:2px solid #e2e8f0;border-radius:10px;font-family:'Nunito',sans-serif;font-size:1rem;outline:none;transition:border .2s;}
  #gate input:focus{border-color:var(--blue);}
  #gate button{margin-top:1rem;width:100%;padding:.8rem;background:linear-gradient(135deg,#1e40af,#6366f1);color:#fff;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s;}
  #gate button:hover{opacity:.88;}
  #gate .err{color:var(--red);font-size:.85rem;margin-top:.6rem;min-height:1.1rem;}

  #main{display:none;position:relative;z-index:1;}

  header{background:linear-gradient(135deg,#1e40af 0%,#2563eb 100%);
    padding:3rem 1.5rem 2.5rem;text-align:center;position:relative;overflow:hidden;}
  header .stars{position:absolute;inset:0;pointer-events:none;}
  header .stars span{position:absolute;border-radius:50%;background:#fff;animation:twinkle 3s infinite;}
  @keyframes twinkle{0%,100%{opacity:.15;transform:scale(1);}50%{opacity:.9;transform:scale(1.4);}}
  .chip{display:inline-block;background:rgba(255,255,255,.18);color:#e0eaff;font-family:'Space Mono',monospace;font-size:.72rem;letter-spacing:.1em;padding:.3rem .9rem;border-radius:99px;border:1px solid rgba(255,255,255,.25);margin-bottom:.9rem;}
  header h1{font-size:clamp(1.6rem,4.5vw,2.6rem);font-weight:900;
    background:linear-gradient(90deg,#93c5fd,#fff 50%,#c7d2fe);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    line-height:1.15;margin-bottom:.5rem;}
  header p.sub{color:rgba(255,255,255,.7);font-size:1rem;max-width:560px;margin:0 auto;}

  .wrap{max-width:900px;margin:0 auto;padding:2.5rem 1.2rem 4rem;}

  .ref-box{background:linear-gradient(135deg,#eff6ff,#eef2ff);border:1.5px solid #bfdbfe;border-radius:16px;padding:1.4rem 1.6rem;margin-bottom:.9rem;}
  .ref-box h3{font-size:1rem;font-weight:800;color:var(--indigo);margin-bottom:.7rem;}
  .ref-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:.5rem .8rem;}
  .ref-item{font-family:'Space Mono',monospace;font-size:.82rem;color:#1e3a5f;background:#fff;padding:.4rem .7rem;border-radius:8px;border:1px solid #dbeafe;}

  .tip-box{background:linear-gradient(135deg,#fffbeb,#fef3c7);border-left:4px solid var(--amber);border-radius:0 12px 12px 0;padding:.9rem 1.1rem;margin-bottom:2rem;}
  .tip-box strong{color:#92400e;}
  .tip-box p{color:#374151;font-size:.9rem;margin-bottom:0;}

  .part-label{font-family:'Space Mono',monospace;font-size:.72rem;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:.8rem;margin-top:1.8rem;}

  .prob-full{background:#fff;border-radius:14px;padding:1.5rem 1.6rem;box-shadow:0 2px 14px rgba(59,130,246,.06);border:1px solid #e8edf8;margin-bottom:1.2rem;}
  .prob-full .p-num{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--muted);margin-bottom:.5rem;letter-spacing:.08em;}
  .prob-full p{color:#374151;line-height:1.68;margin-bottom:.5rem;}
  .prob-full p:last-of-type{margin-bottom:.3rem;}
  .work-lines .line{border-bottom:1px solid #e2e8f0;height:26px;margin-bottom:4px;}
  .work-lines{border-top:1px solid #e8edf8;margin-top:.9rem;padding-top:.7rem;}
  .work-lines .box-ans{border:1.5px solid #bfdbfe;border-radius:8px;height:38px;margin-top:.5rem;display:flex;align-items:center;padding:0 .8rem;color:#94a3b8;font-size:.85rem;}

  /* T/F */
  .tf-card{background:#fff;border-radius:14px;padding:1.4rem 1.6rem;box-shadow:0 2px 14px rgba(59,130,246,.06);border:1px solid #e8edf8;margin-bottom:1rem;}
  .tf-card .p-num{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--muted);margin-bottom:.4rem;}
  .tf-card p{color:#374151;line-height:1.65;margin-bottom:.6rem;}
  .tf-options{display:flex;gap:1.5rem;margin-bottom:.7rem;}
  .tf-options label{display:flex;align-items:center;gap:.4rem;font-weight:700;color:#374151;font-size:.95rem;cursor:pointer;}
  .tf-options input{accent-color:var(--indigo);}
  .corr-line-label{font-size:.85rem;font-weight:700;color:#64748b;margin-bottom:.3rem;}
  .corr-line{border-bottom:1px solid #e2e8f0;height:26px;margin-bottom:4px;}

  /* Challenge */
  .challenge-card{background:linear-gradient(135deg,#faf5ff,#ede9fe);border:1.5px solid #c4b5fd;border-radius:14px;padding:1.5rem 1.6rem;margin-bottom:1.2rem;}
  .challenge-card .p-num{font-family:'Space Mono',monospace;font-size:.7rem;color:#7c3aed;margin-bottom:.5rem;}
  .challenge-card p{color:#374151;line-height:1.68;margin-bottom:.5rem;}
  .challenge-card .work-lines .line{border-bottom:1px solid #ddd6fe;height:26px;margin-bottom:4px;}
  .challenge-card .work-lines{border-top:1px solid #ddd6fe;margin-top:.9rem;padding-top:.7rem;}
  .challenge-card .work-lines .box-ans{border:1.5px solid #c4b5fd;border-radius:8px;height:38px;margin-top:.5rem;display:flex;align-items:center;padding:0 .8rem;color:#94a3b8;font-size:.85rem;}

  /* Answer key */
  #answer-key{display:none;margin-top:2rem;}
  .key-card{background:#fff;border-radius:14px;padding:1.5rem;border:1.5px solid #bbf7d0;margin-bottom:1rem;}
  .key-card h3{font-size:1rem;font-weight:800;color:#065f46;margin-bottom:.8rem;}
  .key-item{display:flex;gap:.6rem;margin-bottom:.7rem;align-items:flex-start;}
  .key-num{font-family:'Space Mono',monospace;font-size:.75rem;background:#d1fae5;color:#065f46;padding:.2rem .5rem;border-radius:6px;white-space:nowrap;margin-top:1px;}
  .key-text{color:#374151;font-size:.9rem;line-height:1.65;}
  .key-formula{font-family:'Space Mono',monospace;font-size:.82rem;background:#f0fdf4;padding:.4rem .7rem;border-radius:8px;margin:.3rem 0;color:#065f46;display:block;}

  .toggle-btn{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border:none;padding:.75rem 2rem;border-radius:10px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s;display:block;margin:0 auto;}
  .toggle-btn:hover{opacity:.88;}

  .ak-header{background:linear-gradient(135deg,#1e40af,#1d4ed8);color:white;border-radius:12px;padding:22px 28px;margin-bottom:28px;}
  .ak-header h1{font-size:1.3rem;margin:0;font-weight:800;}
  .ak-header p{margin:6px 0 0;opacity:.75;font-size:.88rem;}
  #answer-key{display:block!important;}
  </style>
</head>
<body>
  <div class="ak-header">
    <h1>🔑 Answer Key</h1>
    <p>Unit 15 Homework – Air Resistance</p>
  </div>
  <p>Answer key content not found.</p>
</body>
</html>
