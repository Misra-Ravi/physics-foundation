<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kinematics from Geometry — Answer Key</title>
  <style>

    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap');
    :root{--blue:#3b82f6;--indigo:#6366f1;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--dark:#0f172a;--bg:#f8faff;--muted:#94a3b8;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito',sans-serif;background:#f0f4f8;background-image:radial-gradient(circle,#c7d2fe 1px,transparent 1px);background-size:28px 28px;color:#1a1a2e;font-size:16px;line-height:1.7;}
    header{background:linear-gradient(135deg,#1e40af 0%,#2563eb 100%);color:white;padding:32px 60px 28px;}
    header .label{font-size:12px;text-transform:uppercase;letter-spacing:2px;opacity:0.85;margin-bottom:6px;}
    header h1{font-size:2rem;font-weight:800;margin-bottom:4px;}
    header .meta{opacity:0.85;font-size:0.9rem;}
    main{max-width:860px;margin:36px auto;padding:0 24px 60px;}
    .ref-box{background:white;border:2px solid #bfdbfe;border-radius:12px;padding:20px 24px;margin-bottom:14px;}
    .ref-box h3{color:#1e3a5f;font-size:1rem;font-weight:800;margin-bottom:12px;}
    .ref-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    @media(max-width:580px){.ref-grid{grid-template-columns:1fr;}}
    .ref-item{background:#eff6ff;border-radius:8px;padding:10px 14px;font-size:0.88rem;}
    .ref-item .sym{font-family:'Space Mono',monospace;font-weight:700;color:#1d4ed8;display:block;margin-bottom:2px;}
    .ref-eq-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
    .eq-chip{background:#1e3a5f;color:white;font-family:'Space Mono',monospace;font-size:0.82rem;font-weight:700;padding:5px 12px;border-radius:8px;}
    .tip-note{background:#fffbeb;border:2px solid #fde68a;border-radius:10px;padding:12px 18px;margin-bottom:20px;font-size:0.88rem;color:#78350f;font-weight:600;}
    section{margin-bottom:44px;}
    h2{font-size:1.2rem;font-weight:800;color:#1e3a5f;border-left:5px solid #3b82f6;padding-left:12px;margin-bottom:16px;}
    .instructions{color:#4b5563;font-size:0.9rem;margin-bottom:16px;font-style:italic;}
    .hw-problem{background:white;border-radius:10px;padding:20px 24px;box-shadow:0 1px 6px rgba(0,0,0,0.08);margin-bottom:16px;}
    .problem-num{font-size:0.72rem;font-weight:800;text-transform:uppercase;color:#6b7280;margin-bottom:6px;letter-spacing:0.5px;}
    .scenario{font-size:0.95rem;font-weight:600;color:#1a1a2e;margin-bottom:12px;line-height:1.55;}
    .field-set{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
    .field-row{display:flex;align-items:center;gap:8px;font-size:0.88rem;font-weight:600;}
    .fill-line{border-bottom:2px solid #d1d5db;min-height:26px;flex:1;}
    .workbox{border:1.5px solid #e2e8f0;border-radius:6px;min-height:80px;margin-top:4px;padding:8px;}
    .workbox-label{font-size:0.72rem;color:#94a3b8;font-weight:700;text-transform:uppercase;}
    .answer-final{border:2px solid #3b82f6;border-radius:8px;padding:10px 16px;margin-top:8px;font-size:0.9rem;font-weight:700;color:#1e3a5f;display:flex;align-items:center;gap:8px;}
    .answer-final .af-label{font-size:0.72rem;font-weight:800;text-transform:uppercase;color:#6b7280;min-width:60px;}
    .ans-fill-hw{border-bottom:2px solid #d1d5db;min-height:24px;display:inline-block;min-width:120px;}
    /* True/False */
    .tf-item{background:white;border-radius:10px;padding:18px 22px;box-shadow:0 1px 6px rgba(0,0,0,0.08);margin-bottom:14px;}
    .tf-q{font-weight:700;font-size:0.95rem;color:#1a1a2e;margin-bottom:12px;}
    .tf-options{display:flex;gap:16px;margin-bottom:12px;}
    .tf-option{display:flex;align-items:center;gap:6px;font-weight:700;font-size:0.9rem;cursor:pointer;}
    .tf-circle{width:18px;height:18px;border-radius:50%;border:2.5px solid #d1d5db;flex-shrink:0;}
    .correction-box{background:#f8faff;border-radius:6px;border:1.5px solid #e2e8f0;padding:8px 12px;margin-top:6px;}
    .correction-label{font-size:0.72rem;color:#6b7280;font-weight:700;text-transform:uppercase;margin-bottom:6px;}
    .correction-line{border-bottom:1.5px solid #d1d5db;min-height:22px;margin-bottom:8px;}
    /* Challenge */
    .challenge-card{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:2px solid #86efac;border-radius:12px;padding:22px 26px;margin-bottom:16px;}
    .challenge-card .ch-badge{display:inline-block;background:#15803d;color:white;font-size:0.72rem;font-weight:900;text-transform:uppercase;letter-spacing:1px;padding:3px 12px;border-radius:20px;margin-bottom:8px;}
    .challenge-card .scenario{color:#14532d;}
    .challenge-steps{display:flex;flex-direction:column;gap:10px;margin-top:12px;}
    .challenge-step{background:white;border-radius:8px;padding:12px 16px;font-size:0.88rem;font-weight:600;}
    .challenge-step .cst-label{font-size:0.72rem;font-weight:800;text-transform:uppercase;color:#15803d;margin-bottom:4px;}
    /* Answer Key */
    .key-btn-wrap{text-align:center;margin:40px 0 20px;}
    #toggle-key-btn{background:#1e3a5f;color:white;border:none;padding:12px 36px;font-size:1rem;font-weight:800;border-radius:10px;cursor:pointer;font-family:inherit;transition:background 0.2s;}
    #toggle-key-btn:hover{background:#1d4ed8;}
    #answer-key{display:none;background:#eff6ff;border:2px solid #93c5fd;border-radius:14px;padding:28px 32px;margin-top:16px;}
    #answer-key h2{color:#1e3a5f;border-left-color:#3b82f6;margin-bottom:24px;}
    .key-section{margin-bottom:28px;}
    .key-section h3{font-size:1rem;font-weight:800;color:#1e3a5f;margin-bottom:14px;}
    .key-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
    .key-item{background:white;border-radius:8px;padding:12px 16px;font-size:0.92rem;}
    .key-item .kq{font-size:0.78rem;color:#6b7280;margin-bottom:3px;font-weight:700;}
    .key-item .kans{color:#1d4ed8;font-weight:700;font-family:'Space Mono',monospace;font-size:0.9rem;}
    .key-item .kexpl{color:#4b5563;font-size:0.8rem;margin-top:4px;line-height:1.5;}
    .tf-key-item{background:white;border-radius:8px;padding:14px 18px;margin-bottom:10px;}
    .tf-key-item .tkq{font-size:0.78rem;color:#6b7280;font-weight:700;margin-bottom:4px;}
    .tf-key-item .tkans{font-weight:800;margin-bottom:4px;}
    .tf-key-item .tkans.true{color:#15803d;}
    .tf-key-item .tkans.false{color:#ef4444;}
    .tf-key-item .tkexpl{font-size:0.82rem;color:#374151;line-height:1.5;}
    .ch-key{background:white;border-radius:8px;padding:16px 20px;margin-bottom:12px;}
    .ch-key .ckq{font-size:0.82rem;font-weight:800;color:#15803d;margin-bottom:8px;}
    .ch-key .ckstep{font-family:'Space Mono',monospace;font-size:0.85rem;color:#374151;margin-bottom:4px;}
    .ch-key .ckans{color:#ef4444;font-weight:700;font-family:'Space Mono',monospace;font-size:0.95rem;margin-top:6px;}
  
  .ak-header{background:linear-gradient(135deg,#1e40af,#1d4ed8);color:white;border-radius:12px;padding:22px 28px;margin-bottom:28px;}
  .ak-header h1{font-size:1.3rem;margin:0;font-weight:800;}
  .ak-header p{margin:6px 0 0;opacity:.75;font-size:.88rem;}
  #answer-key{display:block!important;}
  </style>
</head>
<body>
  <div class="ak-header">
    <h1>🔑 Answer Key</h1>
    <p>Kinematics from Geometry — Homework</p>
  </div>
  <p>Answer key content not found.</p>
</body>
</html>
