<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Answer Key — Acceleration · Kinematics Unit 3</title>
  <style>

  :root{
    --blue:#3b82f6;--indigo:#6366f1;--green:#22c55e;--amber:#f59e0b;
    --red:#ef4444;--dark:#0f172a;--bg:#f8faff;--muted:#94a3b8;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;}
  body::before{
    content:'';position:fixed;inset:0;
    background-image:radial-gradient(circle,#cbd5e1 1px,transparent 1px);
    background-size:28px 28px;pointer-events:none;z-index:0;opacity:.55;
  }
  /* PASSWORD GATE */
  #gate{
    position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#1e40af,#2563eb);
  }
  #gate-box{
    background:#fff;border-radius:20px;padding:2.5rem 2rem;width:320px;text-align:center;
    box-shadow:0 25px 60px rgba(0,0,0,.35);
  }
  #gate-box h2{font-size:1.4rem;font-weight:800;color:var(--dark);margin-bottom:.4rem;}
  #gate-box p{font-size:.85rem;color:var(--muted);margin-bottom:1.4rem;}
  #gate-input{
    width:100%;padding:.7rem 1rem;border:2px solid #e2e8f0;border-radius:10px;
    font-family:'Nunito',sans-serif;font-size:1rem;outline:none;transition:border .2s;
  }
  #gate-input:focus{border-color:var(--blue);}
  #gate-btn{
    margin-top:.9rem;width:100%;padding:.75rem;background:linear-gradient(90deg,var(--blue),var(--indigo));
    color:#fff;border:none;border-radius:10px;font-family:'Nunito',sans-serif;
    font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s;
  }
  #gate-btn:hover{opacity:.88;}
  #gate-err{color:var(--red);font-size:.83rem;margin-top:.55rem;min-height:1.1rem;}
  /* MAIN */
  #main{display:none;position:relative;z-index:1;}
  /* HEADER */
  header{
    background:linear-gradient(135deg,#1e40af 0%,#2563eb 100%);
    padding:3rem 2rem 2.5rem;text-align:center;position:relative;overflow:hidden;
  }
  .stars{position:absolute;inset:0;pointer-events:none;}
  .star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur,3s) ease-in-out infinite;opacity:0;}
  @keyframes twinkle{0%,100%{opacity:0;transform:scale(.6);}50%{opacity:.9;transform:scale(1.2);}}
  .chip{
    display:inline-block;background:rgba(255,255,255,.15);backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,.3);color:#e0e7ff;
    font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    padding:.35rem .9rem;border-radius:999px;margin-bottom:1rem;
  }
  header h1{
    font-size:clamp(1.8rem,4.5vw,2.9rem);font-weight:900;
    background:linear-gradient(90deg,#ffffff,#bfdbfe,#a5b4fc);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    margin-bottom:.5rem;
  }
  header p.sub{color:#bfdbfe;font-size:.98rem;font-weight:600;}
  /* CONTENT */
  .content{max-width:860px;margin:0 auto;padding:2.5rem 1.25rem 4rem;}
  /* CARDS */
  .card{
    background:#fff;border-radius:18px;padding:1.8rem 2rem;margin-bottom:1.8rem;
    box-shadow:0 4px 20px rgba(59,130,246,.08);border:1px solid #e8edf5;
  }
  /* REFERENCE BOX */
  .ref-box{
    background:linear-gradient(135deg,#eff6ff,#eef2ff);border:2px solid #c7d2fe;
    border-radius:14px;padding:1.2rem 1.5rem;margin-bottom:1.8rem;
  }
  .ref-box h3{font-size:.98rem;font-weight:800;color:var(--indigo);margin-bottom:.8rem;}
  .ref-grid{display:flex;flex-wrap:wrap;gap:.6rem;}
  .ref-item{
    background:#fff;border:1.5px solid #c7d2fe;border-radius:9px;
    padding:.4rem .8rem;font-family:'Space Mono',monospace;font-size:.84rem;font-weight:700;color:var(--dark);
  }
  .ref-tip{
    margin-top:.9rem;background:linear-gradient(135deg,#fefce8,#fef3c7);border-left:3px solid var(--amber);
    border-radius:0 8px 8px 0;padding:.6rem 1rem;font-size:.84rem;color:#92400e;font-weight:700;
  }
  /* PART HEADINGS */
  .part-heading{
    font-size:1.1rem;font-weight:900;color:#fff;
    background:linear-gradient(90deg,var(--blue),var(--indigo));
    border-radius:10px;padding:.55rem 1.1rem;margin-bottom:1.2rem;display:inline-block;
  }
  /* PROBLEM CARDS */
  .prob-card{
    background:#f8faff;border:2px solid #e8edf5;border-radius:14px;padding:1.2rem 1.4rem;
    margin-bottom:1.2rem;transition:border-color .2s;
  }
  .prob-card:hover{border-color:var(--blue);}
  .prob-num{
    display:inline-block;font-size:.78rem;font-weight:800;color:#fff;
    background:var(--blue);border-radius:6px;padding:.15rem .55rem;margin-bottom:.6rem;
  }
  .prob-text{font-size:.91rem;line-height:1.65;margin-bottom:.7rem;}
  /* GESE structured inputs */
  .gese-fields{display:grid;grid-template-columns:auto 1fr;gap:.4rem .8rem;align-items:center;margin-bottom:.8rem;}
  .gese-lbl{
    font-size:.82rem;font-weight:800;color:#fff;padding:.2rem .55rem;border-radius:6px;text-align:center;
  }
  .lbl-g{background:var(--blue);}
  .lbl-u{background:var(--indigo);}
  .lbl-e{background:var(--amber);}
  .lbl-s{background:var(--green);}
  .gese-input{
    border:2px solid #e2e8f0;border-radius:8px;padding:.35rem .7rem;
    font-family:'Space Mono',monospace;font-size:.85rem;outline:none;transition:border .2s;width:100%;
  }
  .gese-input:focus{border-color:var(--blue);}
  .ans-box{display:flex;align-items:center;gap:.6rem;margin-top:.5rem;}
  .ans-label{font-size:.78rem;font-weight:700;color:var(--muted);}
  .ans-input{
    flex:1;border:2px solid #e2e8f0;border-radius:8px;padding:.35rem .7rem;
    font-family:'Space Mono',monospace;font-size:.9rem;outline:none;transition:border .2s;
  }
  .ans-input:focus{border-color:var(--green);}
  /* TF PROBLEMS */
  .tf-card{
    background:#f8faff;border:2px solid #e8edf5;border-radius:14px;
    padding:1.2rem 1.4rem;margin-bottom:1.1rem;transition:border-color .2s;
  }
  .tf-card:hover{border-color:var(--amber);}
  .tf-num{
    display:inline-block;font-size:.78rem;font-weight:800;color:#fff;
    background:var(--amber);border-radius:6px;padding:.15rem .55rem;margin-bottom:.6rem;
  }
  .tf-row{display:flex;gap:.7rem;margin-top:.5rem;}
  .tf-btn{
    padding:.35rem .9rem;border:2px solid #e2e8f0;border-radius:8px;
    font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;
    transition:background .15s,border-color .15s;background:#fff;
  }
  .tf-btn:hover{border-color:var(--blue);background:#eff6ff;}
  .tf-btn.selected-true{background:#d1fae5;border-color:var(--green);color:#065f46;}
  .tf-btn.selected-false{background:#fee2e2;border-color:var(--red);color:#991b1b;}
  .correction-line{
    width:100%;border:none;border-bottom:1.5px dashed #e2e8f0;
    background:transparent;outline:none;padding:.3rem 0;
    font-family:'Nunito',sans-serif;font-size:.88rem;color:var(--dark);display:block;margin-top:.6rem;
  }
  /* CHALLENGE */
  .challenge-card{
    background:linear-gradient(135deg,#faf5ff,#f5f3ff);border:2px solid #c4b5fd;
    border-radius:14px;padding:1.3rem 1.5rem;margin-bottom:1.2rem;
  }
  .chal-num{
    display:inline-block;font-size:.78rem;font-weight:800;color:#fff;
    background:var(--indigo);border-radius:6px;padding:.15rem .55rem;margin-bottom:.6rem;
  }
  .work-field{
    width:100%;border:none;border-bottom:1.5px dashed #c4b5fd;
    background:transparent;outline:none;padding:.3rem 0;
    font-family:'Nunito',sans-serif;font-size:.88rem;color:var(--dark);display:block;margin-bottom:.35rem;
  }
  /* ANSWER KEY */
  #toggle-key-btn{
    display:block;margin:1.5rem auto 0;padding:.7rem 2rem;
    background:linear-gradient(90deg,var(--red),#dc2626);
    color:#fff;border:none;border-radius:10px;
    font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;
    transition:opacity .2s;
  }
  #toggle-key-btn:hover{opacity:.88;}
  #answer-key{display:none;margin-top:1.5rem;}
  .key-card{
    background:#fff;border:2px solid var(--green);border-radius:16px;
    padding:1.5rem;margin-bottom:1.2rem;
    box-shadow:0 4px 16px rgba(34,197,94,.1);
  }
  .key-card h3{font-size:1rem;font-weight:800;color:var(--green);margin-bottom:1rem;}
  .key-item{border-bottom:1px solid #e8edf5;padding:.65rem 0;font-size:.88rem;line-height:1.7;}
  .key-item:last-child{border-bottom:none;}
  .key-item strong{color:var(--dark);font-weight:800;}
  .key-ans{font-family:'Space Mono',monospace;font-weight:700;color:var(--green);}
  .key-work{display:block;font-family:'Space Mono',monospace;font-size:.82rem;color:#64748b;margin-top:.25rem;line-height:1.6;}
  @media(max-width:600px){.content{padding:1.5rem .8rem 3rem;}.card{padding:1.2rem;}.gese-fields{grid-template-columns:1fr;}}

  .ak-header{background:linear-gradient(135deg,#1e40af,#1d4ed8);color:white;border-radius:12px;padding:22px 28px;margin-bottom:28px;}
  .ak-header h1{font-size:1.3rem;margin:0;font-weight:800;}
  .ak-header p{margin:6px 0 0;opacity:.75;font-size:.88rem;}
  #answer-key{display:block!important;}
  </style>
</head>
<body>
  <div class="ak-header">
    <h1>🔑 Answer Key</h1>
    <p>Homework — Acceleration · Kinematics Unit 3</p>
  </div>
  <p>Answer key content not found.</p>
</body>
</html>
