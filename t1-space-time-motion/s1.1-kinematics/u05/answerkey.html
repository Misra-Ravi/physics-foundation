<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kinematics · Unit 5 — Answer Key: Position-Time Graphs</title>
  <style>

:root{
  --blue:#3b82f6;--indigo:#6366f1;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;
  --dark:#0f172a;--bg:#f8faff;--muted:#94a3b8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;}
body::before{
  content:'';position:fixed;inset:0;z-index:-1;
  background-image:radial-gradient(circle,#cbd5e1 1px,transparent 1px);
  background-size:28px 28px;opacity:.55;
}

/* PASSWORD GATE */
#gate{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0f172a,#1e3a5f);}
.gate-box{background:#1e293b;border:1px solid #334155;border-radius:20px;padding:48px 40px;
  max-width:400px;width:90%;text-align:center;}
.gate-box h2{color:#f1f5f9;font-size:1.5rem;font-weight:800;margin-bottom:8px;}
.gate-box p{color:var(--muted);font-size:.95rem;margin-bottom:24px;}
.gate-box input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid #475569;
  background:#0f172a;color:#f1f5f9;font-family:'Nunito',sans-serif;font-size:1rem;outline:none;margin-bottom:12px;}
.gate-box button{width:100%;padding:12px;border-radius:10px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--blue),var(--indigo));color:#fff;
  font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;}
.gate-error{color:var(--red);font-size:.875rem;margin-top:8px;display:none;}

/* HEADER */
header{
  background:linear-gradient(135deg,#1e40af 0%,#2563eb 100%);
  padding:56px 24px 40px;text-align:center;position:relative;overflow:hidden;
}
.stars{position:absolute;inset:0;pointer-events:none;}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 3s infinite alternate;}
@keyframes twinkle{from{opacity:.2;transform:scale(1);}to{opacity:1;transform:scale(1.4);}}
.chip{display:inline-block;background:rgba(255,255,255,.15);color:#e0e7ff;
  font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700;letter-spacing:.08em;
  padding:5px 14px;border-radius:99px;border:1px solid rgba(255,255,255,.25);margin-bottom:16px;}
header h1{
  font-size:clamp(1.8rem,5vw,3rem);font-weight:900;
  background:linear-gradient(135deg,#ffffff,#bfdbfe,#a5b4fc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:10px;
}
header p{color:#bfdbfe;font-size:1.05rem;max-width:600px;margin:0 auto;}

main{max-width:900px;margin:0 auto;padding:36px 20px 80px;}

/* REFERENCE BOX */
.ref-box{background:linear-gradient(135deg,#1e40af,#2563eb);color:#e0e7ff;border-radius:16px;
  padding:24px 28px;margin-bottom:16px;}
.ref-box h3{font-size:1rem;font-weight:800;color:#fff;margin-bottom:14px;}
.ref-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}
.ref-item{background:rgba(255,255,255,.1);border-radius:10px;padding:10px 14px;}
.ref-item .label{font-size:.72rem;font-weight:800;letter-spacing:.08em;color:#93c5fd;
  text-transform:uppercase;margin-bottom:4px;}
.ref-item .val{font-family:'Space Mono',monospace;font-size:.88rem;color:#fff;}

/* TIP BOX */
.tip-box{background:linear-gradient(135deg,#fff7ed,#fef9c3);border-left:4px solid var(--amber);
  border-radius:10px;padding:14px 18px;margin-bottom:28px;}
.tip-box .label{font-size:.72rem;font-weight:800;letter-spacing:.1em;color:var(--amber);
  text-transform:uppercase;margin-bottom:5px;}
.tip-box p{font-size:.9rem;line-height:1.6;color:#78350f;}

/* SECTION HEADERS */
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;margin-top:32px;}
.part-badge{background:linear-gradient(135deg,var(--blue),var(--indigo));color:#fff;
  font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700;
  padding:5px 14px;border-radius:99px;white-space:nowrap;}
.section-header h2{font-size:1.15rem;font-weight:800;color:var(--dark);}

/* PROBLEM CARDS */
.prob-card{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(15,23,42,.06);
  padding:24px 28px;border:1px solid #e2e8f0;margin-bottom:20px;}
.prob-card .prob-num{font-family:'Space Mono',monospace;font-size:.72rem;font-weight:700;
  color:var(--indigo);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.prob-card p{font-size:.93rem;line-height:1.7;color:var(--dark);}

/* WORK BOX */
.work-box{background:#f8faff;border:1px dashed #cbd5e1;border-radius:10px;
  min-height:100px;margin-top:14px;padding:12px 16px;}
.work-box-label{font-size:.75rem;font-weight:700;color:var(--muted);margin-bottom:8px;
  text-transform:uppercase;letter-spacing:.06em;}

/* ANSWER LINE */
.ans-line{border:none;border-bottom:2px solid #cbd5e1;width:100%;margin-top:10px;
  background:transparent;font-family:'Nunito',sans-serif;font-size:.93rem;
  padding:4px 0;outline:none;color:var(--dark);}
.ans-row{display:flex;gap:20px;margin-top:12px;flex-wrap:wrap;}
.ans-field{flex:1;min-width:140px;}
.ans-field label{display:block;font-size:.8rem;font-weight:700;color:var(--muted);margin-bottom:4px;}

/* TRUE/FALSE */
.tf-card{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(15,23,42,.06);
  padding:22px 28px;border:1px solid #e2e8f0;margin-bottom:16px;}
.tf-card .prob-num{font-family:'Space Mono',monospace;font-size:.72rem;font-weight:700;
  color:var(--amber);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.tf-card .statement{font-weight:700;font-size:.95rem;line-height:1.6;margin-bottom:14px;}
.tf-options{display:flex;gap:14px;margin-bottom:12px;}
.tf-btn{padding:8px 22px;border-radius:8px;border:2px solid #e2e8f0;background:#f8faff;
  font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;
  color:var(--dark);transition:.15s;}
.tf-btn:hover{border-color:var(--blue);background:#eff6ff;}
.correction-label{font-size:.8rem;font-weight:700;color:var(--muted);margin-bottom:4px;}
.correction-line{height:32px;border:none;border-bottom:1.5px solid #e2e8f0;}

/* CHALLENGE */
.challenge-card{background:linear-gradient(135deg,#fdf4ff,#ede9fe);border-radius:14px;
  box-shadow:0 2px 10px rgba(99,102,241,.1);padding:24px 28px;
  border:1px solid #ddd6fe;margin-bottom:20px;}
.challenge-card .prob-num{font-family:'Space Mono',monospace;font-size:.72rem;font-weight:700;
  color:#7c3aed;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.challenge-card p{font-size:.93rem;line-height:1.7;}

/* GRAPH WRAP */
.graph-wrap{display:flex;justify-content:center;margin:14px 0;}

/* ANSWER KEY */
.key-toggle-wrap{text-align:center;margin:40px 0 16px;}
#toggle-key-btn{background:linear-gradient(135deg,#1e40af,#2563eb);color:#fff;
  border:none;border-radius:10px;padding:12px 28px;font-family:'Nunito',sans-serif;
  font-size:.95rem;font-weight:700;cursor:pointer;}
#answer-key{display:none;background:#fff;border-radius:16px;border:2px solid #e2e8f0;
  padding:28px 32px;margin-top:8px;}
#answer-key h3{font-size:1.1rem;font-weight:800;margin-bottom:20px;color:var(--dark);}
.key-item{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #f1f5f9;}
.key-item:last-child{border-bottom:none;}
.key-num{font-family:'Space Mono',monospace;font-size:.72rem;font-weight:700;color:var(--indigo);
  text-transform:uppercase;margin-bottom:4px;}
.key-ans{font-size:.9rem;line-height:1.6;color:var(--dark);}
.key-ans strong{color:var(--green);}
.key-work{font-family:'Space Mono',monospace;font-size:.82rem;color:#475569;
  background:#f8faff;border-radius:6px;padding:8px 12px;margin-top:6px;white-space:pre-wrap;}

  .ak-header{background:linear-gradient(135deg,#1e40af,#1d4ed8);color:white;border-radius:12px;padding:22px 28px;margin-bottom:28px;}
  .ak-header h1{font-size:1.3rem;margin:0;font-weight:800;}
  .ak-header p{margin:6px 0 0;opacity:.75;font-size:.88rem;}
  #answer-key{display:block!important;}
  </style>
</head>
<body>
  <div class="ak-header">
    <h1>🔑 Answer Key</h1>
    <p>Kinematics · Unit 5 — Homework: Position-Time Graphs</p>
  </div>
  <p>Answer key content not found.</p>
</body>
</html>
