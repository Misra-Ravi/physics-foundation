<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kinematics Unit 6 – Velocity-Time Graphs I | Answer Key</title>
  <style>

  :root{
    --blue:#3b82f6;--indigo:#6366f1;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;
    --dark:#0f172a;--bg:#f8faff;--muted:#94a3b8;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;}
  body::before{
    content:'';position:fixed;inset:0;z-index:-1;
    background-image:radial-gradient(circle,#cbd5e1 1px,transparent 1px);
    background-size:28px 28px;opacity:.55;
  }

  /* PASSWORD GATE */
  #gate{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#1e40af,#2563eb);}
  .gate-box{background:#fff;border-radius:20px;padding:2.5rem 2rem;text-align:center;max-width:340px;width:90%;box-shadow:0 25px 60px rgba(0,0,0,.3);}
  .gate-box h2{font-size:1.4rem;font-weight:800;color:var(--dark);margin-bottom:.5rem;}
  .gate-box p{color:var(--muted);font-size:.9rem;margin-bottom:1.2rem;}
  .gate-box input{width:100%;padding:.75rem 1rem;border:2px solid #e2e8f0;border-radius:10px;font-family:'Nunito',sans-serif;font-size:1rem;outline:none;transition:border .2s;}
  .gate-box input:focus{border-color:var(--blue);}
  .gate-box button{margin-top:.9rem;width:100%;padding:.75rem;background:var(--blue);color:#fff;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s;}
  .gate-box button:hover{background:#1d4ed8;}
  .gate-err{color:var(--red);font-size:.85rem;margin-top:.6rem;display:none;}

  /* HEADER */
  header{
    background:linear-gradient(135deg,#1e40af 0%,#2563eb 100%);
    padding:3rem 1.5rem 2.5rem;text-align:center;position:relative;overflow:hidden;
  }
  .stars{position:absolute;inset:0;pointer-events:none;}
  .star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 3s infinite alternate;}
  @keyframes twinkle{0%{opacity:.2;transform:scale(1);}100%{opacity:.9;transform:scale(1.4);}}
  .chip{display:inline-block;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
    color:#e0eaff;font-family:'Space Mono',monospace;font-size:.75rem;letter-spacing:.08em;
    padding:.3rem .9rem;border-radius:999px;margin-bottom:1rem;}
  header h1{font-size:clamp(1.6rem,4vw,2.6rem);font-weight:900;
    background:linear-gradient(90deg,#e0f2fe,#bfdbfe,#c7d2fe);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    line-height:1.2;margin-bottom:.5rem;}
  header p.sub{color:#bfdbfe;font-size:1rem;font-weight:600;}

  /* MAIN */
  main{max-width:900px;margin:0 auto;padding:2rem 1.2rem 4rem;}

  /* REFERENCE BOX */
  .ref-box{background:linear-gradient(135deg,#1e293b,#1e3a5f);color:#e0f2fe;border-radius:16px;
    padding:1.4rem 1.6rem;margin-bottom:1.2rem;box-shadow:0 4px 20px rgba(0,0,0,.2);}
  .ref-box h3{font-size:.95rem;font-weight:800;color:#7dd3fc;letter-spacing:.07em;text-transform:uppercase;margin-bottom:.8rem;}
  .ref-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.5rem;}
  .ref-item{font-family:'Space Mono',monospace;font-size:.82rem;color:#bfdbfe;padding:.3rem .5rem;
    background:rgba(255,255,255,.06);border-radius:6px;}

  /* TIP BOX */
  .tip-box{background:linear-gradient(135deg,#fffbeb,#fef3c7);border-left:4px solid var(--amber);
    border-radius:0 12px 12px 0;padding:.9rem 1.2rem;margin-bottom:1.8rem;}
  .tip-box strong{color:#92400e;display:block;margin-bottom:.3rem;font-size:.85rem;text-transform:uppercase;letter-spacing:.06em;}
  .tip-box p{font-size:.9rem;color:#78350f;line-height:1.6;}

  /* SECTION HEADERS */
  .section-hdr{display:flex;align-items:center;gap:.8rem;margin:2rem 0 1rem;}
  .section-hdr .badge{font-family:'Space Mono',monospace;font-size:.72rem;font-weight:700;letter-spacing:.08em;
    padding:.35rem .8rem;border-radius:8px;color:#fff;}
  .badge-a{background:var(--blue);}
  .badge-b{background:var(--indigo);}
  .badge-c{background:var(--red);}
  .section-hdr h2{font-size:1.1rem;font-weight:800;color:var(--dark);}

  /* PROBLEM CARDS */
  .prob-card{background:#fff;border-radius:14px;padding:1.3rem 1.5rem;border:1px solid #e0e7ff;
    box-shadow:0 2px 10px rgba(59,130,246,.07);margin-bottom:1.2rem;}
  .prob-card .pnum{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--blue);font-weight:700;margin-bottom:.5rem;letter-spacing:.06em;}
  .prob-card p{font-size:.95rem;line-height:1.75;color:#334155;margin-bottom:.5rem;}
  .work-line{height:28px;border-bottom:1px solid #e2e8f0;margin-bottom:3px;}
  .work-block{margin-top:.8rem;}
  .formula-hint{font-family:'Space Mono',monospace;font-size:.82rem;background:#f1f5f9;color:#475569;
    padding:.45rem .7rem;border-radius:7px;display:inline-block;margin-bottom:.6rem;}

  /* TRUE/FALSE CARDS */
  .tf-card{background:#fff;border-radius:14px;padding:1.3rem 1.5rem;border:1.5px solid #e0e7ff;
    box-shadow:0 2px 10px rgba(99,102,241,.07);margin-bottom:1.1rem;}
  .tf-card .pnum{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--indigo);font-weight:700;margin-bottom:.4rem;letter-spacing:.06em;}
  .tf-card p{font-size:.95rem;line-height:1.7;color:#334155;}
  .tf-row{display:flex;gap:1.5rem;margin:.7rem 0 .5rem;align-items:center;}
  .tf-option{display:flex;align-items:center;gap:.4rem;font-weight:700;font-size:.95rem;}
  .tf-option input{accent-color:var(--indigo);width:16px;height:16px;}
  .correction-label{font-size:.82rem;color:var(--muted);margin-bottom:.3rem;}
  .correction-line{height:28px;border-bottom:1.5px solid #e2e8f0;}

  /* CHALLENGE */
  .challenge-card{background:linear-gradient(135deg,#fdf4ff,#ede9fe);border:1.5px solid #a855f7;border-radius:14px;
    padding:1.3rem 1.5rem;margin-bottom:1.2rem;}
  .challenge-card .pnum{font-family:'Space Mono',monospace;font-size:.7rem;color:#7c3aed;font-weight:700;margin-bottom:.5rem;letter-spacing:.06em;}
  .challenge-card p{font-size:.95rem;line-height:1.75;color:#2d1f4e;}

  /* ANSWER KEY */
  .key-toggle{display:flex;justify-content:flex-end;margin:1.5rem 0 .5rem;}
  #toggle-key-btn{background:var(--dark);color:#fff;border:none;border-radius:10px;padding:.65rem 1.4rem;
    font-family:'Nunito',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:background .2s;display:flex;align-items:center;gap:.5rem;}
  #toggle-key-btn:hover{background:#1e3a5f;}
  #answer-key{display:none;}
  .key-section{background:linear-gradient(135deg,#1e293b,#0f172a);border-radius:16px;padding:1.5rem;color:#e2e8f0;}
  .key-section h3{font-size:1rem;font-weight:800;color:#7dd3fc;margin-bottom:1rem;text-transform:uppercase;letter-spacing:.07em;}
  .key-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:.7rem;}
  .key-item{background:rgba(255,255,255,.06);border-radius:10px;padding:.8rem 1rem;}
  .key-item .knum{font-family:'Space Mono',monospace;font-size:.7rem;color:#94a3b8;margin-bottom:.3rem;}
  .key-item p{font-size:.88rem;line-height:1.6;color:#e0f2fe;}
  .key-item .kans{font-family:'Space Mono',monospace;color:#34d399;font-weight:700;font-size:.9rem;margin-top:.3rem;}
  .kans-red{font-family:'Space Mono',monospace;color:#f87171;font-weight:700;font-size:.9rem;margin-top:.3rem;}

  .ak-header{background:linear-gradient(135deg,#1e40af,#1d4ed8);color:white;border-radius:12px;padding:22px 28px;margin-bottom:28px;}
  .ak-header h1{font-size:1.3rem;margin:0;font-weight:800;}
  .ak-header p{margin:6px 0 0;opacity:.75;font-size:.88rem;}
  #answer-key{display:block!important;}
  </style>
</head>
<body>
  <div class="ak-header">
    <h1>🔑 Answer Key</h1>
    <p>Kinematics Unit 6 – Velocity-Time Graphs I | Homework</p>
  </div>
  <p>Answer key content not found.</p>
</body>
</html>
